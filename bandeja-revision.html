<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bandeja de revisión — MIR COMAPA Sur</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="session.js"></script>
  <script src="mock-notifications.js"></script>
  <script src="mir-actividades-data.js"></script>
  <script src="layout.js"></script>
  <style>
    :root {
      --color-primary:#8B1D3A; --color-danger:#EF4444;
      --color-warning:#F59E0B; --color-success:#22C55E; --color-info:#3B82F6;
      --color-bg:#FFFFFF; --color-surface:#F7F7F7; --color-border:#E5E7EB;
      --color-text-primary:#111827; --color-text-secondary:#6B7280;
      --radius-card:16px;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--color-surface);color:var(--color-text-primary);display:flex;min-height:100vh;}

    .sidebar{width:64px;background:var(--color-bg);border-right:1px solid var(--color-border);display:flex;flex-direction:column;align-items:center;padding:16px 0;gap:4px;position:fixed;top:0;left:0;height:100vh;z-index:100;}
    .sidebar-logo{width:36px;height:36px;background:var(--color-primary);border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;}
    .sidebar-logo svg{width:18px;height:18px;stroke:white;}
    .sidebar-nav{display:flex;flex-direction:column;gap:2px;flex:1;}
    .nav-item{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--color-text-secondary);transition:background .15s,color .15s;position:relative;text-decoration:none;}
    .nav-item:hover{background:var(--color-surface);}
    .nav-item.active{background:#EFF6FF;color:var(--color-info);}
    .nav-item svg{width:20px;height:20px;}
    .nav-badge{position:absolute;top:6px;right:6px;width:8px;height:8px;border-radius:50%;background:var(--color-danger);border:1.5px solid #fff;}
    .sidebar-bottom{display:flex;flex-direction:column;align-items:center;gap:8px;}
    .avatar-xs{width:32px;height:32px;border-radius:50%;background:var(--color-info);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;}

    .app-wrapper{display:flex;flex:1;margin-left:64px;}
    .main-content{flex:1;padding:28px 32px;}

    /* HEADER */
    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
    .ph-left h1{font-size:22px;font-weight:700;margin-bottom:2px;}
    .ph-left p{font-size:13px;color:var(--color-text-secondary);}
    .count-chip{display:inline-flex;align-items:center;padding:4px 12px;border-radius:999px;font-size:11px;font-weight:700;background:#EFF6FF;color:var(--color-info);margin-left:8px;}

    /* FILTER BAR */
    .filter-bar{background:var(--color-bg);border-radius:var(--radius-card);padding:14px 18px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06);display:flex;flex-direction:column;gap:10px;}
    .filter-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .search-wrap{position:relative;flex:1;min-width:200px;}
    .search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:#9CA3AF;}
    .search-input{width:100%;padding:8px 10px 8px 32px;border:1px solid var(--color-border);border-radius:10px;font-size:13px;font-family:inherit;outline:none;background:var(--color-surface);transition:border-color .15s;}
    .search-input:focus{border-color:var(--color-info);background:white;}
    .filter-select{padding:8px 12px;border:1px solid var(--color-border);border-radius:10px;font-size:12px;font-family:inherit;outline:none;background:var(--color-surface);color:var(--color-text-primary);cursor:pointer;}
    .filter-select:focus{border-color:var(--color-info);}
    .sort-btn{display:inline-flex;align-items:center;gap:5px;padding:8px 12px;border:1px solid var(--color-border);border-radius:10px;font-size:12px;font-weight:600;font-family:inherit;background:var(--color-surface);cursor:pointer;white-space:nowrap;transition:background .12s;}
    .sort-btn:hover{background:var(--color-border);}
    .sort-btn svg{width:14px;height:14px;}
    .chips-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
    .chip{padding:5px 14px;border-radius:999px;font-size:12px;font-weight:600;border:1.5px solid var(--color-border);background:transparent;cursor:pointer;font-family:inherit;color:var(--color-text-secondary);transition:all .12s;}
    .chip.active{background:var(--color-info);color:white;border-color:var(--color-info);}
    .chip:hover:not(.active){background:var(--color-surface);}

    /* TABLE */
    .table-card{background:var(--color-bg);border-radius:var(--radius-card);box-shadow:0 1px 3px rgba(0,0,0,.06);overflow:hidden;}
    .rev-table{width:100%;border-collapse:collapse;}
    .rev-table th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--color-text-secondary);padding:10px 12px;text-align:left;white-space:nowrap;background:var(--color-surface);border-bottom:1px solid var(--color-border);}
    .rev-table th.sortable{cursor:pointer;user-select:none;}
    .rev-table th.sortable:hover{color:var(--color-info);}
    .rev-table td{padding:12px;border-bottom:1px solid var(--color-border);vertical-align:middle;}
    .rev-table tr:last-child td{border-bottom:none;}
    .rev-table tr:hover td{background:#FAFAFA;}
    .act-id{font-size:10px;font-weight:700;font-family:monospace;color:var(--color-primary);}
    .act-name{font-size:13px;font-weight:600;color:var(--color-text-primary);}
    .act-sub{font-size:11px;color:var(--color-text-secondary);margin-top:2px;}
    .estado-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:999px;font-size:10px;font-weight:700;white-space:nowrap;}
    .estado-badge::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0;}
    .corregido{background:#F5F3FF;color:#7C3AED;}.corregido::before{background:#8B5CF6;}
    .enviado_revision{background:#EFF6FF;color:#2563EB;}.enviado_revision::before{background:#3B82F6;}
    .observado{background:#FFF7ED;color:#EA580C;}.observado::before{background:#F97316;}
    .aprobado_revisor{background:#F0FDF4;color:#16A34A;}.aprobado_revisor::before{background:#22C55E;}
    .vencido{background:#FEF2F2;color:#DC2626;}.vencido::before{background:#EF4444;}
    .prio-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;}
    .prio-badge::before{content:'';width:5px;height:5px;border-radius:50%;}
    .prio-alta{background:#FEE2E2;color:#DC2626;}.prio-alta::before{background:#DC2626;}
    .prio-media{background:#FEF3C7;color:#D97706;}.prio-media::before{background:#D97706;}
    .prio-normal{background:#F3F4F6;color:#6B7280;}.prio-normal::before{background:#9CA3AF;}
    .prio-vencida{background:#111827;color:white;}.prio-vencida::before{background:white;}
    .nivel-badge{display:inline-flex;padding:2px 7px;border-radius:999px;font-size:10px;font-weight:700;}
    .nivel-fin{background:#EDE9FE;color:#7C3AED;}
    .nivel-proposito{background:#DBEAFE;color:#1D4ED8;}
    .nivel-componente{background:#CCFBF1;color:#0F766E;}
    .nivel-actividad{background:#F3F4F6;color:#374151;}
    .dias-val{font-size:12px;font-weight:700;}
    .dias-val.urgente{color:var(--color-danger);}
    .dias-val.proximo{color:var(--color-warning);}
    .dias-val.normal{color:var(--color-success);}
    .btn-rev{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;font-size:11px;font-weight:700;border:none;cursor:pointer;text-decoration:none;font-family:inherit;white-space:nowrap;transition:opacity .12s;}
    .btn-rev:hover{opacity:.80;}
    .btn-rev.blue{background:#EFF6FF;color:var(--color-info);}
    .btn-rev.purple{background:#F5F3FF;color:#7C3AED;}
    .btn-rev.green{background:#F0FDF4;color:#15803D;}
    .btn-rev svg{width:12px;height:12px;}
    .empty-state{text-align:center;padding:60px 24px;color:var(--color-text-secondary);}
    .empty-state svg{width:40px;height:40px;color:#D1D5DB;margin:0 auto 12px;}
    .empty-state p{font-size:13px;}
    .results-count{font-size:12px;color:var(--color-text-secondary);padding:8px 12px;border-bottom:1px solid var(--color-border);background:var(--color-surface);}
  </style>
</head>
<body>

  </div>
  <div class="sidebar-nav">

<div class="app-wrapper">
  <main class="main-content">
    <div class="page-header">
      <div class="ph-left">
        <h1>Bandeja de revisión <span class="count-chip" id="countChip">0</span></h1>
        <p>Evidencias recibidas de los Enlace para revisión técnica · Gerencia Comercial</p>
      </div>
    </div>

    <div class="filter-bar">
      <div class="filter-row">
        <div class="search-wrap">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/></svg>
          <input class="search-input" id="searchInput" placeholder="Buscar por nombre o ID…" oninput="applyFilters()">
        </div>
        <select class="filter-select" id="fEstado" onchange="applyFilters()">
          <option value="">Todos los estados</option>
          <option value="enviado_revision">En revisión</option>
          <option value="corregido">Corrección recibida</option>
          <option value="observado">Observada</option>
          <option value="aprobado_revisor">Aprobada</option>
        </select>
        <select class="filter-select" id="fNivel" onchange="applyFilters()">
          <option value="">Todos los niveles</option>
          <option value="F">Fin</option>
          <option value="P">Propósito</option>
          <option value="C">Componente</option>
          <option value="A">Actividad</option>
        </select>
        <select class="filter-select" id="fSort" onchange="applyFilters()">
          <option value="prio">Por prioridad</option>
          <option value="fecha_asc">Más próximas a vencer</option>
          <option value="fecha_desc">Más lejanas</option>
          <option value="envio_desc">Más recientes primero</option>
          <option value="envio_asc">Más antiguas primero</option>
        </select>
      </div>
      <div class="chips-row">
        <button class="chip active" data-chip="todas" onclick="setChip('todas')">Todas</button>
        <button class="chip" data-chip="pendiente" onclick="setChip('pendiente')">Pendientes de revisión</button>
        <button class="chip" data-chip="corregidas" onclick="setChip('corregidas')">Correcciones</button>
        <button class="chip" data-chip="urgentes" onclick="setChip('urgentes')">Próximas a vencer</button>
        <button class="chip" data-chip="observadas" onclick="setChip('observadas')">Observadas</button>
        <button class="chip" data-chip="aprobadas" onclick="setChip('aprobadas')">Aprobadas</button>
      </div>
    </div>

    <div class="table-card">
      <div class="results-count" id="resultsCount"></div>
      <table class="rev-table">
        <thead><tr>
          <th style="padding-left:20px;">Actividad / Indicador</th>
          <th>Enlace</th>
          <th>Medio de verificación</th>
          <th>Estado</th>
          <th>Prioridad</th>
          <th class="sortable" onclick="toggleSort()">Fecha límite ↕</th>
          <th>Recibida</th>
          <th>Acción</th>
        </tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </main>
</div>

<script>
  let activeChip = 'todas';
  let sortAsc    = true;

  function setChip(c) {
    activeChip = c;
    document.querySelectorAll('.chip').forEach(b => b.classList.toggle('active', b.dataset.chip === c));
    applyFilters();
  }
  function toggleSort() { sortAsc = !sortAsc; applyFilters(); }

  function prioOrder(a) { const p = prioridad(a); return { alta: 0, media: 1, normal: 2, vencida: 3 }[p] ?? 2; }

  function applyFilters() {
    let data = getActividadesRevisor();
    const q  = document.getElementById('searchInput').value.toLowerCase();
    const fe = document.getElementById('fEstado').value;
    const fn = document.getElementById('fNivel').value;
    const fs = document.getElementById('fSort').value;

    if (activeChip === 'pendiente') data = data.filter(a => ['enviado_revision','pendiente_revision'].includes(a.estado));
    else if (activeChip === 'corregidas') data = data.filter(a => a.estado === 'corregido');
    else if (activeChip === 'urgentes')  data = data.filter(a => {
      const d = diasRestantes(a.fechaLimite);
      return ['enviado_revision','pendiente_revision','corregido'].includes(a.estado) && d <= 14;
    });
    else if (activeChip === 'observadas') data = data.filter(a => a.estado === 'observado');
    else if (activeChip === 'aprobadas')  data = data.filter(a => ['aprobado_revisor','validado_admin','publicado'].includes(a.estado));

    if (q)  data = data.filter(a => a.nombre.toLowerCase().includes(q) || a.id.toLowerCase().includes(q));
    if (fe) data = data.filter(a => a.estado === fe);
    if (fn) data = data.filter(a => a.nivelCodigo === fn);

    if (fs === 'prio')       data.sort((a, b) => prioOrder(a) - prioOrder(b) || diasRestantes(a.fechaLimite) - diasRestantes(b.fechaLimite));
    else if (fs === 'fecha_asc')  data.sort((a, b) => diasRestantes(a.fechaLimite) - diasRestantes(b.fechaLimite));
    else if (fs === 'fecha_desc') data.sort((a, b) => diasRestantes(b.fechaLimite) - diasRestantes(a.fechaLimite));
    else if (fs === 'envio_desc') data.sort((a, b) => fechaEnvio(b).localeCompare(fechaEnvio(a)));
    else if (fs === 'envio_asc')  data.sort((a, b) => fechaEnvio(a).localeCompare(fechaEnvio(b)));

    document.getElementById('countChip').textContent = data.length;
    document.getElementById('resultsCount').textContent = `${data.length} resultado${data.length !== 1 ? 's' : ''}`;
    document.getElementById('tableBody').innerHTML = data.length ? data.map(renderRow).join('') : `
      <tr><td colspan="8">
        <div class="empty-state">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 13.5h3.86a2.25 2.25 0 0 1 2.012 1.244l.256.512a2.25 2.25 0 0 0 2.013 1.244h3.218a2.25 2.25 0 0 0 2.013-1.244l.256-.512a2.25 2.25 0 0 1 2.013-1.244h3.859m-19.5.338V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18v-4.162c0-.224-.034-.447-.1-.661L19.24 5.338a2.25 2.25 0 0 0-2.15-1.588H6.911a2.25 2.25 0 0 0-2.15 1.588L2.35 13.177a2.25 2.25 0 0 0-.1.661Z"/></svg>
          <p>No hay actividades que coincidan con los filtros aplicados.</p>
        </div>
      </td></tr>`;
  }

  function renderRow(a) {
    const cfg  = ESTADO_CFG[a.estado] || { label: a.estado, cls: a.estado };
    const niv  = NIVEL_CFG[a.nivelCodigo] || { label: a.nivelCodigo, cls: 'nivel-actividad' };
    const p    = prioridad(a);
    const pCls = { alta: 'prio-alta', media: 'prio-media', normal: 'prio-normal', vencida: 'prio-vencida' }[p] || 'prio-normal';
    const pLbl = { alta: 'Alta', media: 'Media', normal: 'Normal', vencida: 'Vencida' }[p] || 'Normal';
    const dias = diasRestantes(a.fechaLimite);
    const dCls = dias < 0 ? '' : dias <= 7 ? 'urgente' : dias <= 14 ? 'proximo' : 'normal';
    const dTxt = dias < 0 ? 'Vencida' : dias === 0 ? 'Hoy' : `${dias}d`;
    const isEditable = ['enviado_revision','pendiente_revision','corregido'].includes(a.estado);
    const btnCls = a.estado === 'corregido' ? 'purple' : isEditable ? 'blue' : 'green';
    const btnLbl = a.estado === 'corregido' ? 'Revisar corrección' : isEditable ? 'Revisar' : 'Ver detalle';

    return `<tr>
      <td style="padding-left:20px;max-width:260px;">
        <div class="act-id">${a.id}</div>
        <div class="act-name">${a.nombre}</div>
        <div class="act-sub"><span class="nivel-badge ${niv.cls}">${niv.label}</span> · ${a.periodo}</div>
      </td>
      <td style="font-size:12px;white-space:nowrap;">${a.responsableEnlace}<br><span style="color:var(--color-text-secondary);">${a.gerencia}</span></td>
      <td style="font-size:11px;color:var(--color-text-secondary);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${a.medioVerificacion}">${a.medioVerificacion}</td>
      <td><span class="estado-badge ${cfg.cls}">${cfg.label}</span></td>
      <td><span class="prio-badge ${pCls}">${pLbl}</span></td>
      <td>
        <div class="dias-val ${dCls}">${dTxt}</div>
        <div style="font-size:10px;color:var(--color-text-secondary);">${formatFecha(a.fechaLimite)}</div>
      </td>
      <td style="font-size:11px;color:var(--color-text-secondary);white-space:nowrap;">${formatFecha(fechaEnvio(a))}</td>
      <td>
        <a class="btn-rev ${btnCls}" href="revision-actividad.html?id=${a.id}">
          ${btnLbl}
          <svg fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5"/></svg>
        </a>
      </td>
    </tr>`;
  }

  document.addEventListener('DOMContentLoaded', () => {
    // Honor URL chip param
    const urlChip = new URLSearchParams(window.location.search).get('chip');
    if (urlChip) setChip(urlChip);
    else applyFilters();
  });
</script>
</body>
</html>
