<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Revisor — MIR COMAPA Sur</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="session.js"></script>
  <script src="mock-notifications.js"></script>
  <script src="mir-actividades-data.js"></script>
  <script src="layout.js"></script>
  <style>
    :root {
      --color-primary:#8B1D3A; --color-accent-dark:#6B1630;
      --color-danger:#EF4444; --color-warning:#F59E0B;
      --color-success:#22C55E; --color-info:#3B82F6;
      --color-bg:#FFFFFF; --color-surface:#F7F7F7;
      --color-border:#E5E7EB; --color-text-primary:#111827;
      --color-text-secondary:#6B7280; --color-avatar-bg:#3B82F6;
      --radius-card:16px;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--color-surface);color:var(--color-text-primary);display:flex;min-height:100vh;}

    /* SIDEBAR */
    .sidebar{width:64px;background:var(--color-bg);border-right:1px solid var(--color-border);display:flex;flex-direction:column;align-items:center;padding:16px 0;gap:4px;position:fixed;top:0;left:0;height:100vh;z-index:100;}
    .sidebar-logo{width:36px;height:36px;background:var(--color-primary);border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;}
    .sidebar-logo svg{width:18px;height:18px;stroke:white;}
    .sidebar-nav{display:flex;flex-direction:column;gap:2px;flex:1;}
    .nav-item{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--color-text-secondary);transition:background .15s,color .15s;position:relative;text-decoration:none;}
    .nav-item:hover{background:var(--color-surface);}
    .nav-item.active{background:#EFF6FF;color:var(--color-info);}
    .nav-item svg{width:20px;height:20px;}
    .nav-badge{position:absolute;top:6px;right:6px;width:8px;height:8px;border-radius:50%;background:var(--color-danger);border:1.5px solid #fff;}
    .sidebar-bottom{display:flex;flex-direction:column;align-items:center;gap:8px;}
    .avatar-xs{width:32px;height:32px;border-radius:50%;background:var(--color-avatar-bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;}

    /* LAYOUT */
    .app-wrapper{display:flex;flex:1;margin-left:64px;}
    .main-content{flex:1;padding:28px 32px;max-width:1100px;}

    /* WELCOME */
    .welcome-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
    .welcome-left h1{font-size:22px;font-weight:700;margin-bottom:2px;}
    .welcome-left p{font-size:13px;color:var(--color-text-secondary);}
    .welcome-date{font-size:12px;color:var(--color-text-secondary);background:var(--color-bg);border:1px solid var(--color-border);border-radius:10px;padding:7px 14px;font-weight:600;}
    .role-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;background:#EFF6FF;color:var(--color-info);margin-left:8px;vertical-align:middle;}

    /* KPI GRID */
    .kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px;}
    .kpi-card{background:var(--color-bg);border-radius:var(--radius-card);padding:18px 16px;box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer;transition:box-shadow .15s,transform .1s;text-decoration:none;color:inherit;display:block;}
    .kpi-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1);transform:translateY(-1px);}
    .kpi-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;}
    .kpi-icon svg{width:18px;height:18px;}
    .kpi-icon.blue{background:#EFF6FF;} .kpi-icon.blue svg{color:var(--color-info);}
    .kpi-icon.purple{background:#F5F3FF;} .kpi-icon.purple svg{color:#7C3AED;}
    .kpi-icon.orange{background:#FFF7ED;} .kpi-icon.orange svg{color:#EA580C;}
    .kpi-icon.green{background:#F0FDF4;} .kpi-icon.green svg{color:var(--color-success);}
    .kpi-icon.red{background:#FEF2F2;} .kpi-icon.red svg{color:var(--color-danger);}
    .kpi-value{font-size:28px;font-weight:800;line-height:1;margin-bottom:4px;}
    .kpi-value.blue{color:var(--color-info);}
    .kpi-value.purple{color:#7C3AED;}
    .kpi-value.orange{color:#EA580C;}
    .kpi-value.green{color:var(--color-success);}
    .kpi-value.red{color:var(--color-danger);}
    .kpi-label{font-size:12px;font-weight:600;color:var(--color-text-primary);margin-bottom:2px;}
    .kpi-sub{font-size:11px;color:var(--color-text-secondary);}

    /* GRID 2 COL */
    .two-col{display:grid;grid-template-columns:1fr 340px;gap:16px;margin-bottom:16px;}

    /* SECTION CARD */
    .section-card{background:var(--color-bg);border-radius:var(--radius-card);box-shadow:0 1px 3px rgba(0,0,0,.06);overflow:hidden;}
    .sc-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--color-border);}
    .sc-title{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;}
    .sc-title svg{width:16px;height:16px;color:var(--color-info);}
    .sc-link{font-size:12px;font-weight:600;color:var(--color-info);text-decoration:none;}
    .sc-link:hover{text-decoration:underline;}
    .sc-body{padding:16px 20px;}

    /* PENDIENTES TABLE */
    .pend-table{width:100%;border-collapse:collapse;}
    .pend-table th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--color-text-secondary);padding:0 8px 8px;text-align:left;white-space:nowrap;}
    .pend-table td{padding:10px 8px;border-top:1px solid var(--color-border);vertical-align:middle;}
    .pend-table tr:first-child td{border-top:none;}
    .pend-table tr:hover td{background:#FAFAFA;}
    .act-id{font-size:10px;font-weight:700;font-family:monospace;color:var(--color-primary);}
    .act-name{font-size:13px;font-weight:600;color:var(--color-text-primary);max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .act-name-sub{font-size:11px;color:var(--color-text-secondary);margin-top:1px;}
    .prio-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;white-space:nowrap;}
    .prio-alta{background:#FEE2E2;color:#DC2626;}
    .prio-media{background:#FEF3C7;color:#D97706;}
    .prio-normal{background:#F3F4F6;color:#6B7280;}
    .prio-vencida{background:#111827;color:white;}
    .prio-badge::before{content:'';width:5px;height:5px;border-radius:50%;}
    .prio-alta::before{background:#DC2626;}
    .prio-media::before{background:#D97706;}
    .prio-normal::before{background:#9CA3AF;}
    .prio-vencida::before{background:white;}
    .dias-chip{font-size:11px;font-weight:700;}
    .dias-chip.urgente{color:var(--color-danger);}
    .dias-chip.proximo{color:var(--color-warning);}
    .dias-chip.normal{color:var(--color-success);}
    .btn-revisar{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:8px;font-size:11px;font-weight:700;border:none;cursor:pointer;text-decoration:none;font-family:inherit;transition:opacity .12s;}
    .btn-revisar.blue{background:#EFF6FF;color:var(--color-info);}
    .btn-revisar.purple{background:#F5F3FF;color:#7C3AED;}
    .btn-revisar:hover{opacity:.80;}
    .btn-revisar svg{width:12px;height:12px;}

    /* ESTADO BADGE */
    .estado-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:999px;font-size:10px;font-weight:700;white-space:nowrap;}
    .estado-badge::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0;}
    .corregido{background:#F5F3FF;color:#7C3AED;}.corregido::before{background:#8B5CF6;}
    .enviado_revision{background:#EFF6FF;color:#2563EB;}.enviado_revision::before{background:#3B82F6;}
    .observado{background:#FFF7ED;color:#EA580C;}.observado::before{background:#F97316;}
    .aprobado_revisor{background:#F0FDF4;color:#16A34A;}.aprobado_revisor::before{background:#22C55E;}
    .vencido{background:#FEF2F2;color:#DC2626;}.vencido::before{background:#EF4444;}

    /* TIMELINE */
    .tl{position:relative;padding-left:20px;display:flex;flex-direction:column;gap:0;}
    .tl::before{content:'';position:absolute;left:6px;top:8px;bottom:8px;width:2px;background:var(--color-border);}
    .tl-item{position:relative;padding-bottom:14px;}
    .tl-item:last-child{padding-bottom:0;}
    .tl-dot{position:absolute;left:-17px;top:4px;width:10px;height:10px;border-radius:50%;border:2px solid var(--color-bg);}
    .tl-dot.revisor{background:var(--color-info);}
    .tl-dot.enlace{background:var(--color-primary);}
    .tl-dot.sistema{background:#9CA3AF;}
    .tl-time{font-size:10px;color:#9CA3AF;margin-bottom:1px;}
    .tl-act{font-size:12px;font-weight:600;color:var(--color-text-primary);}
    .tl-sub{font-size:11px;color:var(--color-text-secondary);margin-top:2px;}

    /* URGENTES */
    .urgente-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--color-border);}
    .urgente-item:last-child{border-bottom:none;padding-bottom:0;}
    .ui-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .ui-icon.orange{background:#FFF7ED;}
    .ui-icon.orange svg{color:#EA580C;}
    .ui-icon.red{background:#FEF2F2;}
    .ui-icon.red svg{color:var(--color-danger);}
    .ui-body{flex:1;min-width:0;}
    .ui-id{font-size:10px;font-family:monospace;font-weight:700;color:var(--color-primary);}
    .ui-name{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .ui-meta{font-size:11px;color:var(--color-text-secondary);margin-top:1px;}
    .ui-action{flex-shrink:0;}

    /* CTA ROW */
    .cta-row{display:flex;gap:10px;margin-bottom:16px;}
    .btn-cta{display:inline-flex;align-items:center;gap:7px;padding:11px 20px;border-radius:12px;font-size:13px;font-weight:700;border:none;cursor:pointer;font-family:inherit;text-decoration:none;transition:opacity .12s;}
    .btn-cta:hover{opacity:.88;}
    .btn-cta.primary{background:var(--color-info);color:white;}
    .btn-cta.secondary{background:var(--color-bg);color:var(--color-text-primary);border:1px solid var(--color-border);}
    .btn-cta svg{width:16px;height:16px;}

    /* NIVEL */
    .nivel-badge{display:inline-flex;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;}
    .nivel-fin{background:#EDE9FE;color:#7C3AED;}
    .nivel-proposito{background:#DBEAFE;color:#1D4ED8;}
    .nivel-componente{background:#CCFBF1;color:#0F766E;}
    .nivel-actividad{background:#F3F4F6;color:#374151;}
  </style>
</head>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const actsRevisor = getActividadesRevisor();
  const pendientes  = actsRevisor.filter(a => ['enviado_revision','pendiente_revision'].includes(a.estado));
  const corregidas  = actsRevisor.filter(a => a.estado === 'corregido');
  const observadas  = actsRevisor.filter(a => a.estado === 'observado');
  const aprobadas   = actsRevisor.filter(a => ['aprobado_revisor','validado_admin','publicado'].includes(a.estado));
  const urgentes    = actsRevisor.filter(a => {
    const d = diasRestantes(a.fechaLimite);
    return ['enviado_revision','pendiente_revision','corregido'].includes(a.estado) && (d <= 14);
  }).sort((a, b) => diasRestantes(a.fechaLimite) - diasRestantes(b.fechaLimite));

  // Recent timeline: all historial entries with actor, most recent first
  const allMovements = [];
  actsRevisor.forEach(a => {
    a.historial.forEach(h => {
      allMovements.push({ ...h, actId: a.id, actNombre: a.nombre });
    });
  });
  allMovements.sort((a, b) => {
    const da = a.fecha + ' ' + a.hora;
    const db = b.fecha + ' ' + b.hora;
    return da < db ? 1 : da > db ? -1 : 0;
  });
  const recentMovs = allMovements.slice(0, 6);

  // Pending to review: pendientes + corregidas, sorted by prioridad then fecha
  const enBandeja = [...pendientes, ...corregidas].sort((a, b) => {
    const pOrder = { alta: 0, media: 1, normal: 2 };
    const pa = pOrder[prioridad(a)] ?? 3;
    const pb = pOrder[prioridad(b)] ?? 3;
    if (pa !== pb) return pa - pb;
    return diasRestantes(a.fechaLimite) - diasRestantes(b.fechaLimite);
  });

  const PRIORIDAD_CFG = {
    alta:    { cls: 'prio-alta',    label: 'Alta' },
    media:   { cls: 'prio-media',   label: 'Media' },
    normal:  { cls: 'prio-normal',  label: 'Normal' },
    vencida: { cls: 'prio-vencida', label: 'Vencida' }
  };

  function diaChip(act) {
    const d = diasRestantes(act.fechaLimite);
    const cls = d < 0 ? '' : d <= 7 ? 'urgente' : d <= 14 ? 'proximo' : 'normal';
    const txt = d < 0 ? 'Vencida' : d === 0 ? 'Hoy' : `${d}d`;
    return `<span class="dias-chip ${cls}">${txt}</span>`;
  }
  function estadoBadge(e) {
    const cfg = ESTADO_CFG[e] || { label: e, cls: e };
    return `<span class="estado-badge ${cfg.cls}">${cfg.label}</span>`;
  }
  function prioBadge(a) {
    const p = prioridad(a);
    const c = PRIORIDAD_CFG[p] || PRIORIDAD_CFG.normal;
    return `<span class="prio-badge ${c.cls}">${c.label}</span>`;
  }
  function nivelBadge(a) {
    const n = NIVEL_CFG[a.nivelCodigo] || { label: a.nivelCodigo, cls: 'nivel-actividad' };
    return `<span class="nivel-badge ${n.cls}">${n.label}</span>`;
  }
  function rolDotCls(rol) {
    const r = (rol||'').toLowerCase();
    if (r.includes('revisor')) return 'revisor';
    if (r.includes('enlace'))  return 'enlace';
    return 'sistema';
  }

  const pendientesRows = enBandeja.length === 0
    ? '<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--color-text-secondary);font-size:13px;">Sin indicadores pendientes de revisión</td></tr>'
    : enBandeja.map(a => `
        <tr>
          <td>
            <div class="act-id">${a.id}</div>
            <div class="act-name">${a.nombre}</div>
            <div class="act-name-sub">${nivelBadge(a)} · ${a.periodo}</div>
          </td>
          <td>${estadoBadge(a.estado)}</td>
          <td>${prioBadge(a)}</td>
          <td>${diaChip(a)} <span style="font-size:11px;color:var(--color-text-secondary);">${formatFecha(a.fechaLimite)}</span></td>
          <td style="font-size:11px;color:var(--color-text-secondary);">${formatFecha(fechaEnvio(a))}</td>
          <td>
