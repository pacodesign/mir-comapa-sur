<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis observaciones — MIR COMAPA Sur</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="session.js"></script>
  <script src="mock-notifications.js"></script>
  <script src="mir-actividades-data.js"></script>
  <script src="layout.js"></script>
  <style>
    :root {
      --color-primary:#8B1D3A; --color-danger:#EF4444;
      --color-warning:#F59E0B; --color-success:#22C55E;
      --color-bg:#FFFFFF; --color-surface:#F7F7F7;
      --color-border:#E5E7EB; --color-text-primary:#111827;
      --color-text-secondary:#6B7280; --color-avatar-bg:#9CA3AF;
      --radius-card:16px;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--color-surface);color:var(--color-text-primary);display:flex;min-height:100vh;}

    /* SIDEBAR */
    .sidebar{width: 148px;background:var(--color-bg);border-right:1px solid var(--color-border);display:flex;flex-direction:column;align-items: stretch;padding: 16px 0;gap:4px;position:fixed;top:0;left:0;height:100vh;z-index:100;}
    .sidebar-logo{width:36px;height:36px;background:var(--color-primary);border-radius:10px;display:flex;align-items:center;justify-content:center;margin: 0 auto 16px;}
    .sidebar-logo svg{width:18px;height:18px;stroke:white;}
    .sidebar-nav{display:flex;flex-direction:column;gap:2px;flex:1;align-items: stretch; padding: 0 8px; }
    .nav-item{width: 100%; height: auto; padding: 7px 10px;border-radius:12px;display:flex;align-items: center; justify-content: flex-start; flex-direction: row; gap: 8px;cursor:pointer;color:var(--color-text-secondary);transition:background .15s,color .15s;position:relative;text-decoration:none;}
    .nav-item:hover{background:var(--color-surface);}
    .nav-item.active{background:#F5E8EC;color:var(--color-primary);}
    .nav-item svg{width:18px;height:18px;}
    .nav-label{font-size:11px;font-weight:600;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .sidebar-bottom{display:flex;flex-direction:column;align-items:center;gap:8px; padding: 0 8px; }
    .avatar-xs{width:32px;height:32px;border-radius:50%;background:var(--color-avatar-bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;}

    /* LAYOUT */
    .app-wrapper{display:flex;flex:1; margin-left:148px;}
    .main-content{flex:1;padding:28px 32px;max-width:920px;}

    /* PAGE HEADER */
    .page-header{margin-bottom:24px;}
    .page-header h1{font-size:22px;font-weight:700;margin-bottom:4px;}
    .page-header p{font-size:13px;color:var(--color-text-secondary);}
    .ph-meta{display:flex;align-items:center;gap:12px;margin-top:10px;}
    .ph-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700;background:#FFF7ED;color:#C2410C;}
    .ph-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:#F97316;}

    /* ALERT BANNER */
    .alert-banner{display:flex;align-items:flex-start;gap:12px;background:#FFFBEB;border:1px solid #FDE68A;border-radius:14px;padding:14px 18px;margin-bottom:24px;}
    .alert-banner svg{width:18px;height:18px;color:#D97706;flex-shrink:0;margin-top:2px;}
    .alert-banner p{font-size:13px;color:#78350F;line-height:1.55;}
    .alert-banner strong{font-weight:700;}

    /* EMPTY STATE */
    .empty-state{text-align:center;padding:80px 24px;}
    .empty-state svg{width:52px;height:52px;color:#D1D5DB;margin:0 auto 16px;}
    .empty-state h2{font-size:18px;font-weight:700;margin-bottom:6px;}
    .empty-state p{font-size:13px;color:var(--color-text-secondary);line-height:1.6;}
    .empty-state a{display:inline-flex;align-items:center;gap:6px;margin-top:18px;color:var(--color-primary);font-weight:700;font-size:13px;text-decoration:none;}

    /* OBS CARD */
    .obs-card{background:var(--color-bg);border-radius:var(--radius-card);box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:16px;overflow:hidden;border-left:4px solid #F97316;}
    .obs-card-head{padding:18px 20px 14px;border-bottom:1px solid var(--color-border);}
    .och-row1{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px;}
    .och-id{font-size:10px;font-weight:700;font-family:monospace;color:var(--color-primary);margin-bottom:4px;}
    .och-title{font-size:15px;font-weight:700;color:var(--color-text-primary);line-height:1.35;}
    .estado-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700;white-space:nowrap;}
    .estado-badge::before{content:'';width:6px;height:6px;border-radius:50%;flex-shrink:0;}
    .observado{background:#FFF7ED;color:#EA580C;}.observado::before{background:#F97316;}
    .och-row2{display:flex;flex-wrap:wrap;gap:8px 20px;}
    .och-meta{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--color-text-secondary);}
    .och-meta svg{width:13px;height:13px;}
    .och-meta strong{color:var(--color-text-primary);font-weight:600;}

    /* OBS BODY */
    .obs-card-body{padding:18px 20px;}
    .obs-section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--color-text-secondary);margin-bottom:8px;}
    .obs-reviewer-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
    .obs-av{width:30px;height:30px;border-radius:50%;background:#3B82F6;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;flex-shrink:0;}
    .obs-reviewer-info{font-size:12px;}
    .obs-reviewer-name{font-weight:700;color:var(--color-text-primary);}
    .obs-reviewer-meta{color:var(--color-text-secondary);margin-top:1px;}
    .obs-text-box{background:#FFFBEB;border:1px solid #FDE68A;border-radius:10px;padding:14px 16px;font-size:13px;color:#78350F;line-height:1.65;margin-bottom:14px;}
    .obs-text-box p::before{content:'"';margin-right:1px;}
    .obs-text-box p::after{content:'"';}

    /* DEADLINE ROW */
    .obs-deadline-row{display:flex;gap:10px;margin-bottom:18px;}
    .dl-item{flex:1;background:var(--color-surface);border-radius:10px;padding:10px 12px;}
    .dl-item-lbl{font-size:10px;color:var(--color-text-secondary);margin-bottom:3px;}
    .dl-item-val{font-size:13px;font-weight:700;}
    .dl-item-val.urgente{color:var(--color-danger);}
    .dl-item-val.proximo{color:var(--color-warning);}
    .dl-item-val.normal{color:var(--color-success);}

    /* CTA */
    .obs-cta{display:flex;align-items:center;justify-content:flex-end;}
    .btn-atender{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;background:var(--color-primary);color:white;border:none;border-radius:10px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;text-decoration:none;transition:opacity .12s;}
    .btn-atender:hover{opacity:.88;}
    .btn-atender svg{width:14px;height:14px;}
  </style>
</head>
<body>

<!-- SIDEBAR -->
<nav class="sidebar">

    <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 0 1 3 19.875v-6.75ZM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V8.625ZM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V4.125Z"/></svg>

<div class="app-wrapper">
  <main class="main-content">

    <div class="page-header">
      <h1>Mis observaciones</h1>
      <p>Actividades con comentarios del Revisor que requieren corrección o justificación.</p>
      <div class="ph-meta" id="phMeta"></div>
    </div>

    <div id="alertBanner"></div>

    <div id="obsContent"></div>

  </main>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const observadas = ACTIVIDADES_ENLACE.filter(a => a.estado === 'observado');
    const total = observadas.length;

    document.getElementById('phMeta').innerHTML = total > 0
      ? `<span class="ph-badge">${total} actividad${total !== 1 ? 'es' : ''} con observación${total !== 1 ? 'es' : ''}</span>`
      : '';

    if (total > 0) {
      const masUrgente = observadas.reduce((min, a) => {
        const d = diasRestantes(a.fechaLimite);
        return d < diasRestantes(min.fechaLimite) ? a : min;
      }, observadas[0]);
      const diasMin = diasRestantes(masUrgente.fechaLimite);
      document.getElementById('alertBanner').innerHTML = `
        <div class="alert-banner">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"/></svg>
          <p>Tienes <strong>${total} actividad${total>1?'es':''}</strong> con observación${total>1?'es':''} del Revisor pendiente${total>1?'s':''} de corrección. La más urgente es <strong>${masUrgente.nombre}</strong> con ${diasMin < 0 ? 'fecha vencida' : `${diasMin} días restantes`}. Atiéndelas antes de que venzan los plazos.</p>
        </div>`;
    }

    if (total === 0) {
      document.getElementById('obsContent').innerHTML = `
        <div class="empty-state">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="1.3" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>
          <h2>Sin observaciones pendientes</h2>
          <p>¡Excelente! Todas tus actividades están al día o en proceso de revisión.<br>No hay observaciones del Revisor que requieran tu atención.</p>
          <a href="mis-actividades.html">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" width="14" height="14"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/></svg>
            Ver mis actividades
          </a>
        </div>`;
      return;
    }

    const sorted = [...observadas].sort((a, b) => {
      return diasRestantes(a.fechaLimite) - diasRestantes(b.fechaLimite);
    });

    document.getElementById('obsContent').innerHTML = sorted.map(act => {
      const dias = diasRestantes(act.fechaLimite);
      const dCls = dias < 0 ? '' : dias <= 7 ? 'urgente' : dias <= 14 ? 'proximo' : 'normal';
      const dTxt = dias < 0 ? 'Vencida' : dias === 0 ? 'Hoy' : `${dias} días restantes`;

      const obs = act.observaciones.length > 0 ? act.observaciones[act.observaciones.length - 1] : null;
      const nivel = NIVEL_CFG[act.nivelCodigo] || { label: act.nivelCodigo };

      return `
        <div class="obs-card">
          <div class="obs-card-head">
            <div class="och-row1">
              <div>
                <p class="och-id">${act.id}</p>
                <h2 class="och-title">${act.nombre}</h2>
              </div>
              <span class="estado-badge observado">Con observación</span>
            </div>
            <div class="och-row2">
              <div class="och-meta">
                <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18M9 6.75h1.5m-1.5 3h1.5m-1.5 3h1.5m3-6H15m-1.5 3H15m-1.5 3H15M9 21v-3.375c0-.621.504-1.125 1.125-1.125h3.75c.621 0 1.125.504 1.125 1.125V21"/></svg>
                <strong>${act.gerencia}</strong>
              </div>
              <div class="och-meta">
                <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5"/></svg>
                Período: <strong>${act.periodo}</strong>
              </div>
              <div class="och-meta">
                Nivel: <strong>${nivel.label}</strong>
              </div>
              <div class="och-meta">
                <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m18.375 12.739-7.693 7.693a4.5 4.5 0 0 1-6.364-6.364l10.94-10.94A3 3 0 1 1 19.5 7.372L8.552 18.32m.009-.01-.01.01m5.699-9.941-7.81 7.81a1.5 1.5 0 0 0 2.112 2.13"/></svg>
                ${act.formatoEsperado}
              </div>
            </div>
          </div>
          <div class="obs-card-body">

            ${obs ? `
              <p class="obs-section-label">Observación del Revisor</p>
              <div class="obs-reviewer-row">
                <div class="obs-av">CM</div>
                <div class="obs-reviewer-info">
                  <p class="obs-reviewer-name">${obs.autor}</p>
                  <p class="obs-reviewer-meta">${obs.rolAutor} · ${formatFecha(obs.fecha)}${obs.hora ? ' · ' + obs.hora : ''}</p>
                </div>
              </div>
              <div class="obs-text-box"><p>${obs.texto}</p></div>` : `
              <p class="obs-section-label">Observación</p>
              <div class="obs-text-box"><p>Esta actividad fue marcada como observada. Revisa el historial para más detalles.</p></div>`}

            <div class="obs-deadline-row">
              <div class="dl-item">
                <p class="dl-item-lbl">Fecha límite</p>
                <p class="dl-item-val ${dCls}">${formatFecha(act.fechaLimite)}</p>
              </div>
              <div class="dl-item">
                <p class="dl-item-lbl">Tiempo restante</p>
                <p class="dl-item-val ${dCls}">${dTxt}</p>
              </div>
              <div class="dl-item">
                <p class="dl-item-lbl">Observaciones</p>
                <p class="dl-item-val" style="color:var(--color-text-primary);">${act.observaciones.length}</p>
              </div>
            </div>

            <div class="obs-cta">
              <a class="btn-atender" href="detalle-actividad.html?id=${act.id}">
                Atender observación
                <svg fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5"/></svg>
              </a>
            </div>

          </div>
        </div>`;
    }).join('');
  });
</script>
</body>
</html>
