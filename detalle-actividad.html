<div class="app-wrapper">
  <main class="main-content" id="mainContent"></main>
  <aside class="action-panel" id="actionPanel"></aside>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal-card">
    <div class="modal-icon green"><svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="22" height="22"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg></div>
    <h3 class="modal-title" id="modalTitle">Confirmar envío</h3>
    <p class="modal-sub" id="modalSub"></p>
    <div class="modal-checklist" id="modalChecklist"></div>
    <div class="modal-actions">
      <button class="btn-modal cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-modal confirm" id="modalConfirmBtn" onclick="confirmarEnvio()">Confirmar envío</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">
  <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>
  <span id="toastMsg"></span>
</div>

<input type="file" id="fileUploadInput" class="upload-input" accept=".pdf,.xlsx,.xls,.docx,.doc,.jpg,.jpeg,.png" onchange="handleFileInput(this)">
<input type="file" id="justSupportInput" class="upload-input" accept=".pdf,.jpg,.jpeg,.png" onchange="handleJustSupport(this)">

<script>
  // ── State ─────────────────────────────────────────────────────────────────
  const isRevisor   = new URLSearchParams(location.search).get('rol') === 'revisor';
  let actividad     = null;
  let obsRevisorText = '';
  let obsOpen        = false;
  let uploadLoading = false;
  let uploadError   = null;   // { name, msg }
  let replaceTargetId = null;
  let justOpen      = false;
  let justText      = '';
  let justSupportFile = null; // { name }
  let justErr       = false;
  const MIN_JUSTIFY  = 50;
  let avanceValue   = '';
  let sinAvance     = false;
  let avanceNum     = '';
  let avanceDen     = '';
  let avanceSaved   = false;
  let warnTimer     = null;
  let comentario        = '';
  let comentarioGuardado = false;
  let justSaved         = false;
  let editingStep1      = false;
  let editingStep2      = false;
  let editingStep3      = false;
  let _editOverride     = null;
  let metaLograda       = null;
  let analisisLogro     = '';
  let analisisCausas    = '';
  let analisisRiesgos   = '';
  let analisisOportunidades = '';
  let analisisAcciones  = '';
  let analisisSaved     = false;

  const ALLOWED_EXT = ['pdf','xlsx','xls','docx','doc','jpg','jpeg','png'];
  const MAX_MB      = 20;

  // ── Helpers ───────────────────────────────────────────────────────────────
  function getParam(k) { return new URLSearchParams(window.location.search).get(k); }

  function validateFile(name, sizeBytes) {
    const ext = name.split('.').pop().toLowerCase();
    if (!ALLOWED_EXT.includes(ext))
      return { ok: false, msg: `Formato .${ext} no permitido. Formatos válidos: PDF, Excel, Word, JPG, PNG.`, code: 'ext' };
    const mb = sizeBytes / (1024 * 1024);
    if (mb > MAX_MB)
      return { ok: false, msg: `El archivo pesa ${mb.toFixed(1)} MB. El tamaño máximo permitido es ${MAX_MB} MB.`, code: 'size' };
    return { ok: true };
  }

  function fileIconCls(tipo) {
    const t = (tipo||'').toLowerCase();
    if (t.includes('pdf'))   return 'pdf';
    if (t.includes('excel') || t.includes('xlsx') || t.includes('xls')) return 'excel';
    if (t.includes('word')  || t.includes('docx')) return 'word';
    return 'img';
  }
  function fileIconLbl(tipo) {
    const t = (tipo||'').toLowerCase();
    if (t.includes('pdf'))   return 'PDF';
    if (t.includes('excel')) return 'XLS';
    if (t.includes('word'))  return 'DOC';
    return 'IMG';
  }
  function rolDotCls(rol) {
    const r = (rol||'').toLowerCase();
    if (r.includes('sistema'))  return 'sistema';
    if (r.includes('enlace'))   return 'enlace';
    if (r.includes('revisor'))  return 'revisor';
    return 'admin';
  }
  function canSend() {
    if (!actividad) return false;
    if (['enviado_revision','pendiente_revision','aprobado_revisor','validado_admin','publicado'].includes(actividad.estado)) return false;
    return actividad.archivosEvidencia.length > 0 || justSaved;
  }
  function isEditable() {
    if (isRevisor) return false;
    if (_editOverride !== null) return _editOverride;
    return actividad && ['borrador','pendiente_carga','pendiente_envio','observado'].includes(actividad.estado);
  }
  function nowStr() { return '2026-06-09'; }
  function nowTime() {
    const mins = ['00','05','10','15','20','25','30'];
    return '10:' + mins[Math.floor(Math.random()*mins.length)];
  }

  // ── Toast ─────────────────────────────────────────────────────────────────
  let _toastTimer = null;
  function showToast(msg) {
    const t = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    t.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => t.classList.remove('show'), 3600);
  }

  // ── Modal ─────────────────────────────────────────────────────────────────
  function openModal() {
    if (!canSend()) return;
    const filesCount = actividad.archivosEvidencia.length;
    const usingJust  = justOpen && justText.trim().length >= MIN_JUSTIFY;
    const isObs = actividad.estado === 'observado';
    const items = [];
    if (filesCount > 0) items.push({ ok: true,  text: `${filesCount} archivo${filesCount>1?'s':''} de evidencia adjunto${filesCount>1?'s':''}` });
    if (usingJust)      items.push({ ok: false, text: 'Incluye justificación de ausencia de evidencia' });
    items.push({ ok: true, text: `Período: ${actividad.periodo}` });
    items.push({ ok: true, text: `Medio requerido: ${actividad.formatoEsperado}` });
    document.getElementById('modalChecklist').innerHTML = items.map(i => `
      <div class="modal-check-item${!i.ok?' warn':''}">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
          ${i.ok
            ? '<path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>'
            : '<path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"/>'}
        </svg>
        ${i.text}
      </div>`).join('');
    document.getElementById('modalTitle').textContent = isObs ? 'Enviar corrección al Revisor' : 'Confirmar envío a revisión';
    document.getElementById('modalSub').textContent   = isObs
      ? 'Estás por enviar tu corrección. Asegúrate de haber atendido todas las observaciones.'
      : 'Esta acción enviará la evidencia al Revisor e iniciará el proceso de revisión técnica.';
    document.getElementById('modalConfirmBtn').textContent = isObs ? 'Enviar corrección' : 'Confirmar envío';
    document.getElementById('confirmModal').classList.add('open');
  }
  function closeModal() { document.getElementById('confirmModal').classList.remove('open'); }

  function confirmarEnvio() {
    closeModal();
    const wasObs    = actividad.estado === 'observado';
    const prevState = actividad.estado;
    actividad.archivosEvidencia.forEach(f => {
      if (['borrador','pendiente_envio'].includes(f.estado)) f.estado = 'enviado';
    });
    actividad.estado = wasObs ? 'corregido' : 'enviado_revision';
    actividad.historial.push({
      fecha: nowStr(), hora: nowTime(),
      usuario: 'Ana Torres', rol: 'Enlace',
      accion: wasObs ? 'Corrección enviada al Revisor' : `Evidencia enviada a revisión (${actividad.archivosEvidencia.length} archivo${actividad.archivosEvidencia.length!==1?'s':''})`,
      estadoAnterior: prevState, estadoNuevo: actividad.estado
    });
    justOpen = false; justText = '';
    renderPage();
    showToast(wasObs ? 'Corrección enviada. El Revisor ha sido notificado.' : 'Enviado a revisión. El Revisor ha sido notificado.');
  }

  // ── Save draft ────────────────────────────────────────────────────────────
  function saveAsDraft() {
    if (!actividad.archivosEvidencia.length && !(justOpen && justText.trim().length > 0)) {
      showToast('Agrega al menos un archivo o una justificación para guardar borrador.');
      return;
    }
    const prevState = actividad.estado;
    actividad.archivosEvidencia.forEach(f => { if (f.estado === 'borrador') f.estado = 'pendiente_envio'; });
    if (['borrador','pendiente_carga'].includes(actividad.estado)) actividad.estado = 'pendiente_envio';
    actividad.historial.push({
      fecha: nowStr(), hora: nowTime(),
      usuario: 'Ana Torres', rol: 'Enlace',
      accion: `Borrador guardado — ${actividad.archivosEvidencia.length} archivo${actividad.archivosEvidencia.length!==1?'s':''}`,
      estadoAnterior: prevState, estadoNuevo: actividad.estado
    });
    renderPage();
    showToast('Borrador guardado. Puedes enviarlo cuando estés listo.');
  }

  // ── Upload ────────────────────────────────────────────────────────────────
  function processRealFile(file, repId) {
    const valid = validateFile(file.name, file.size);
    if (!valid.ok) {
      uploadError = { name: file.name, msg: valid.msg };
      renderPage();
      return;
    }
    uploadError   = null;
    uploadLoading = true;
    renderPage();

    const ext = file.name.split('.').pop().toLowerCase();
    const isImg = ['jpg','jpeg','png','gif','webp'].includes(ext);
    const tipo  = ext === 'pdf' ? 'PDF' : ['xlsx','xls'].includes(ext) ? 'Excel' : ['docx','doc'].includes(ext) ? 'Word' : 'Imagen';

    const finalize = (previewUrl) => {
      const newFile = {
        id: repId || ('f-' + Date.now()),
        nombre: file.name, tipo,
        tamanio: (file.size / (1024*1024)).toFixed(1) + ' MB',
        fechaCarga: nowStr() + ' ' + nowTime(),
        cargadoPor: 'Ana Torres',
        estado: 'borrador',
        preview: previewUrl || null,
        notes: ''
      };
      if (repId) {
        const idx = actividad.archivosEvidencia.findIndex(f => f.id === repId);
        if (idx !== -1) actividad.archivosEvidencia[idx] = newFile;
      } else {
        actividad.archivosEvidencia.push(newFile);
      }
      uploadLoading = false;
      renderPage();
      showToast(`"${file.name}" cargado correctamente.`);
    };

    if (isImg) {
      const reader = new FileReader();
      reader.onload = e => setTimeout(() => finalize(e.target.result), 1200);
      reader.readAsDataURL(file);
    } else {
      setTimeout(() => finalize(null), 1200);
    }
  }

  function handleFileInput(input) {
    if (input.files && input.files[0]) {
      processRealFile(input.files[0], replaceTargetId);
      replaceTargetId = null;
    }
    input.value = '';
  }
  function handleDrop(e) {
    e.preventDefault();
    document.getElementById('uploadZone').classList.remove('drag');
    if (e.dataTransfer.files && e.dataTransfer.files[0]) processRealFile(e.dataTransfer.files[0], null);
  }
  function triggerUpload() { document.getElementById('fileUploadInput').click(); }
  function replaceFile(id) { replaceTargetId = id; document.getElementById('fileUploadInput').click(); }
  function deleteFile(id) {
    actividad.archivosEvidencia = actividad.archivosEvidencia.filter(f => f.id !== id);
    renderPage();
  }
  function updateFileNotes(id, val) {
    const f = actividad.archivosEvidencia.find(x => x.id === id);
    if (f) f.notes = val;
  }
  function dismissError() { uploadError = null; renderPage(); }

  // ── Justify ───────────────────────────────────────────────────────────────
  function toggleJustify() {
    justOpen = !justOpen;
    renderPage();
  }
  function onJustifyInput(val) {
    justText = val;
    justErr  = false;
    updateSendBtn();
    const sendJustBtn = document.getElementById('btnSendJustify');
    if (sendJustBtn) sendJustBtn.disabled = val.trim().length === 0;
  }
  function handleJustSupport(input) {
    if (input.files && input.files[0]) {
      justSupportFile = { name: input.files[0].name };
      renderPage();
    }
    input.value = '';
  }
  function sendJustification() {
    if (!justText.trim()) return;
    justSaved = true;
    renderPage();
    setTimeout(function() {
      const sec = document.getElementById('secComentarios');
      if (sec) sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 50);
  }

  function updateSendBtn() {
    const btn  = document.getElementById('btnEnviar');
    const hint = document.getElementById('sendHint');
    if (!btn) return;
    const ok = canSend();
    btn.disabled = !ok;
    if (hint) hint.textContent = ok ? '' : 'Carga evidencia o agrega una justificación (mín. ' + MIN_JUSTIFY + ' chars).';
  }

  // ── Avance ───────────────────────────────────────────────────────────────
  function onAvanceInput(val) {
    avanceValue = val;
    if (val.trim() && sinAvance) { sinAvance = false; renderPage(); }
  }
  function onAvanceNum(val) {
    avanceNum = val;
    if (val.trim() && sinAvance) { sinAvance = false; renderPage(); return; }
    refreshAvanceCalc();
    if (warnTimer) clearTimeout(warnTimer);
    const warnEl = document.getElementById('avanceCalcWarn');
    if (warnEl) warnEl.classList.remove('warn-visible');
    warnTimer = setTimeout(function() {
      const effectiveDen = actividad.denominadorFijo ? String(actividad.denomFijoVal) : avanceDen;
      const x = parseFloat(avanceNum), y = parseFloat(effectiveDen);
      const ok = !isNaN(x) && !isNaN(y) && y > 0;
      const mp = calcMetaPeriodo(actividad.metaAnual, actividad.frecuenciaMedicion, actividad.acumulable);
      const mpNum = mp ? parseFloat(mp.label) : null;
      const el = document.getElementById('avanceCalcWarn');
      if (el && ok && mpNum && (x / y * 100) < mpNum) el.classList.add('warn-visible');
    }, 2500);
  }
  function onAvanceDen(val) {
    avanceDen = val;
    if (val.trim() && sinAvance) { sinAvance = false; renderPage(); return; }
    refreshAvanceCalc();
  }
  function toggleSinAvance() {
    sinAvance = !sinAvance;
    if (sinAvance) { avanceNum = ''; avanceDen = ''; avanceValue = ''; avanceSaved = false; }
    renderPage();
  }

  function refreshAvanceCalc() {
    const effectiveDen = actividad.denominadorFijo ? String(actividad.denomFijoVal) : avanceDen;
    const x = parseFloat(avanceNum), y = parseFloat(effectiveDen);
    const ok = !isNaN(x) && !isNaN(y) && y > 0;
    const calcEl  = document.getElementById('avanceCalcVal');
    const saveBtn = document.getElementById('btnSaveAvanceFrac');
    const fillEl  = document.getElementById('avanceProgFill');
    const lblEl   = document.getElementById('avanceProgLabel');
    const progWrap= document.getElementById('avanceProgWrap');
    if (!calcEl) return;
    if (ok) {
      const result = x / y * 100;
      calcEl.textContent = result.toFixed(2) + '%';
      calcEl.classList.remove('avance-calc-empty');
      if (saveBtn) saveBtn.disabled = false;
      const mp = calcMetaPeriodo(actividad.metaAnual, actividad.frecuenciaMedicion, actividad.acumulable);
      const mpNum = mp ? parseFloat(mp.label) : null;
      if (fillEl && mpNum && mpNum > 0) {
        fillEl.style.width = Math.min(result / mpNum * 100, 100) + '%';
        if (lblEl) lblEl.textContent = result.toFixed(2) + '% del período';
        if (progWrap) progWrap.style.display = 'block';
      }
    } else {
      calcEl.textContent = 'Ingresa X y Y para calcular';
      calcEl.classList.add('avance-calc-empty');
      if (saveBtn) saveBtn.disabled = true;
      if (fillEl) fillEl.style.width = '0%';
      if (progWrap) progWrap.style.display = 'none';
    }
  }

  function saveAvance() {
    if (sinAvance) {
      avanceSaved = true;
      avanceValue = 'Sin avance';
      actividad.historial.push({
        fecha: nowStr(), hora: nowTime(),
        usuario: 'Ana Torres', rol: 'Enlace',
        accion: 'Sin avance reportado para el período',
        estadoAnterior: null, estadoNuevo: null
      });
      renderPage();
      showToast('Sin avance registrado. Recuerda agregar un comentario justificando el resultado.');
      return;
    }
    if (actividad.tieneDenominador) {
      const effectiveDen = actividad.denominadorFijo ? String(actividad.denomFijoVal) : avanceDen;
      const x = parseFloat(avanceNum), y = parseFloat(effectiveDen);
      if (isNaN(x) || isNaN(y) || y <= 0) return;
      const result = (x / y * 100).toFixed(2) + '%';
      avanceValue = result;
      avanceSaved = true;
      if (actividad.denominadorFijo) avanceDen = effectiveDen;
      actividad.historial.push({
        fecha: nowStr(), hora: nowTime(),
        usuario: 'Ana Torres', rol: 'Enlace',
        accion: `Avance del período reportado: ${result} (Numerador: ${avanceNum}, Denominador: ${effectiveDen})`,
        estadoAnterior: null, estadoNuevo: null
      });
    } else {
      if (!avanceValue.trim()) return;
      avanceSaved = true;
      actividad.historial.push({
        fecha: nowStr(), hora: nowTime(),
        usuario: 'Ana Torres', rol: 'Enlace',
        accion: `Avance del período reportado: ${avanceValue}`,
        estadoAnterior: null, estadoNuevo: null
      });
    }
    editingStep1 = false;
    renderPage();
    showToast('Avance guardado correctamente.');
    if (actividad.tieneDenominador) {
      const effectiveDen = actividad.denominadorFijo ? String(actividad.denomFijoVal) : avanceDen;
      const x = parseFloat(avanceNum), y = parseFloat(effectiveDen);
      const mp = calcMetaPeriodo(actividad.metaAnual, actividad.frecuenciaMedicion, actividad.acumulable);
      const mpNum = mp ? parseFloat(mp.label) : null;
      if (!isNaN(x) && !isNaN(y) && y > 0 && mpNum && (x / y * 100) < mpNum) {
        const el = document.getElementById('avanceCalcWarn');
        if (el) el.classList.add('warn-visible');
      }
    }
  }
  // ── Análisis del reporte ──────────────────────────────────────────────────
  function toggleObs() { obsOpen = !obsOpen; renderPage(); }
  function onObsInput(v) { obsRevisorText = v; }
  function aprobarIndicador() {
    actividad.estado = 'aprobado_revisor';
    actividad.historial.push({ fecha: nowStr(), hora: nowTime(), usuario: 'Carlos Mendoza', rol: 'Revisor',
      accion: 'Reporte aprobado por el Revisor', estadoAnterior: 'enviado_revision', estadoNuevo: 'aprobado_revisor' });
    obsOpen = false;
    renderPage();
    showToast('Reporte aprobado. El Enlace ha sido notificado.');
  }
  function enviarObservacion() {
    if (!obsRevisorText.trim()) return;
    actividad.estado = 'observado';
    actividad.observaciones = actividad.observaciones || [];
    actividad.observaciones.push({ fecha: nowStr(), hora: nowTime(), autor: 'Carlos Mendoza', texto: obsRevisorText });
    actividad.historial.push({ fecha: nowStr(), hora: nowTime(), usuario: 'Carlos Mendoza', rol: 'Revisor',
      accion: 'Observación enviada al Enlace', estadoAnterior: 'enviado_revision', estadoNuevo: 'observado' });
    obsOpen = false; obsRevisorText = '';
    renderPage();
    showToast('Observación enviada. El Enlace será notificado.');
  }
  function toggleEditStep(n) {
    if (n === 1) editingStep1 = !editingStep1;
    else if (n === 2) editingStep2 = !editingStep2;
    else if (n === 3) editingStep3 = !editingStep3;
    renderPage();
  }
  function setMetaLograda(val) { metaLograda = val; renderPage(); }
  function onAnalisisLogro(v)        { analisisLogro = v; }
  function onAnalisisCausas(v)       { analisisCausas = v; }
  function onAnalisisRiesgos(v)      { analisisRiesgos = v; }
  function onAnalisisOportunidades(v){ analisisOportunidades = v; }
  function onAnalisisAcciones(v)     { analisisAcciones = v; }

  function guardarEvidencia() {
    editingStep2 = false;
    renderPage();
    showToast('Medio de verificación actualizado.');
  }

  function guardarAnalisis() {
    analisisSaved = true;
    comentarioGuardado = true;
    editingStep3 = false;
    actividad.historial.push({
      fecha: nowStr(), hora: nowTime(),
      usuario: 'Ana Torres', rol: 'Enlace',
      accion: 'Análisis del reporte guardado',
      estadoAnterior: null, estadoNuevo: null
    });
    renderPage();
    showToast('Análisis guardado.');
  }

  function renderHistorialPeriodos(act) {
    const ps = act.periodosAnteriores;
    if (!ps || ps.length === 0) return '';
    const isFrac = !!act.tieneDenominador;
    const isAcum = !!act.acumulable;
    const CHK = `<svg fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" width="11" height="11"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>`;
    let running = 0;
    const rows = ps.map(p => {
      const val = isFrac
        ? `<strong>${p.resultado.toFixed(1)}%</strong>`
        : `<strong>${p.valor != null ? Number(p.valor).toLocaleString('es-MX') : '—'}</strong>`;
      if (isAcum && p.valor != null) running += p.valor;
      const acumCell = isAcum ? `<td class="ph-acum-val">${running.toLocaleString('es-MX')}</td>` : '';
      const est = p.estado === 'aprobado'
        ? `<span class="ph-ap">${CHK} Aprobado</span>`
        : `<span class="ph-obs">⚠ ${p.estado}</span>`;
      return `<tr><td style="color:var(--color-text-secondary)">${p.periodo}</td><td>${val}</td>${acumCell}<td>${est}</td></tr>`;
    });
    const metaStr = String(act.metaAnual || '');
    const acumHdr = isAcum
      ? `<span class="periodos-hist-acum">Acumulado: ${running.toLocaleString('es-MX')} / ${metaStr}</span>`
      : '';
    const acumTh = isAcum ? `<th>Acumulado</th>` : '';
    return `
      <div class="periodos-hist">
        <div class="periodos-hist-hdr">
          <span class="periodos-hist-lbl">Períodos anteriores</span>
          ${acumHdr}
        </div>
        <table class="periodos-table">
          <thead><tr><th>Período</th><th>${isFrac ? 'Resultado' : 'Valor'}</th>${acumTh}<th>Estado</th></tr></thead>
          <tbody>${rows.join('')}</tbody>
        </table>
      </div>`;
  }

  function renderComentariosSection(act) { return ''; }

  function calcMetaPeriodo(metaAnual, frecuencia, acumulable) {
    const p = {Mensual:{t:12,i:6},Bimestral:{t:6,i:3},Trimestral:{t:4,i:2},Semestral:{t:2,i:1},Anual:{t:1,i:1},Semanal:{t:52,i:23}}[frecuencia]||{t:1,i:1};
    const raw = metaAnual != null ? String(metaAnual) : '';
    if (!raw) return null;
    const m = raw.match(/([\d,]+(?:\.\d+)?)/);
    if (!m) return {label: raw, acum: null};
    const num = parseFloat(m[1].replace(/,/g,''));
    if (isNaN(num)) return {label: raw, acum: null};
    const sfx = raw.slice(m.index + m[1].length).trim();
    const fmt = n => n === Math.round(n) ? String(Math.round(n)) : n.toFixed(1);
    const fv  = n => sfx ? fmt(n) + ' ' + sfx : fmt(n);
    if (!acumulable || p.t === 1) return {label: raw, acum: null};
    return {label: fv(num / p.t), acum: fv(num / p.t * p.i)};
  }

  function renderAvanceSection(act) {
    const editable  = isEditable();
    const isFrac    = !!act.tieneDenominador;
    const isPercent = !isFrac && [(act.lineaBase||''), (act.metaAnual||'')].some(v => v.includes('%'));
    const unitSuffix = (!isFrac && isPercent) ? '%' : '';
    const mp = calcMetaPeriodo(act.metaAnual, act.frecuenciaMedicion, act.acumulable);
    const acumTag = act.acumulable
      ? `<span style="font-size:10px;font-weight:600;background:#DCFCE7;color:#166534;padding:2px 8px;border-radius:999px">Acumulable</span>`
      : `<span style="font-size:10px;font-weight:600;background:#F3F4F6;color:#6B7280;padding:2px 8px;border-radius:999px">No acumulable</span>`;
    const mpVal = mp ? mp.label + (mp.acum ? ` <span style="font-size:10px;color:#6B7280">(acum. esp.: ${mp.acum})</span>` : '') : '—';
    const ctx = [
      { l:'Período',      v: act.periodo },
      { l:'Frecuencia',   v: act.frecuenciaMedicion },
      { l:'Línea base',   v: act.lineaBase },
      { l:'Meta anual',   v: act.metaAnual },
    ].filter(i => i.v).map(i =>
      `<div class="avance-ctx-item"><span>${i.l}:</span><strong>${i.v}</strong></div>`
    ).join('') +
    (mp ? `<div class="avance-ctx-item"><span>Meta del período:</span><strong>${mpVal}</strong></div>` : '') +
    `<div class="avance-ctx-item">${acumTag}</div>`;

    const SAVE_ICO  = `<svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="14" height="14"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>`;
    const CHECK_ICO = `<svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>`;
    const WARN_ICO  = `<svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"/></svg>`;
    const BAN_ICO   = `<svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M18.364 18.364A9 9 0 0 0 5.636 5.636m12.728 12.728A9 9 0 0 1 5.636 5.636m12.728 12.728L5.636 5.636"/></svg>`;

    const sinAvanceSect = sinAvance
      ? `<div class="sin-avance-banner">
           ${WARN_ICO}
           <p>Indicaste que no hubo avance en este período. Agrega una justificación en el paso de comentarios antes de confirmar.</p>
         </div>
         <div style="display:flex;align-items:center;gap:12px;margin-top:12px">
           <button class="btn-save-avance" onclick="saveAvance()">${SAVE_ICO} Confirmar sin avance</button>
           <button class="btn-cancel-link" onclick="toggleSinAvance()">Cancelar</button>
         </div>`
      : `<button class="btn-sin-avance" onclick="toggleSinAvance()">
           ${BAN_ICO} Sin avance en este período
         </button>`;

    const histHtml = renderHistorialPeriodos(act);

    // ── READ-ONLY ──
    if (!editable) {
      let roContent;
      if (avanceSaved && avanceValue.trim()) {
        if (avanceValue === 'Sin avance') {
          roContent = `<div class="sin-avance-ro">${WARN_ICO}<p>Sin avance reportado para este período.</p></div>`;
        } else {
          roContent = isFrac
            ? `<p class="avance-ro-val">Avance registrado: <strong>${avanceValue}</strong> &nbsp;<span style="font-size:12px;color:#6B7280">Numerador: ${avanceNum} / Denominador: ${avanceDen}</span></p>`
            : `<p class="avance-ro-val">Avance registrado: <strong>${avanceValue}${unitSuffix}</strong></p>`;
        }
      } else {
        roContent = `<p style="font-size:13px;color:var(--color-text-secondary)">Sin avance reportado para este período.</p>`;
      }
      return `<div class="avance-ctx">${ctx}</div>${histHtml}${roContent}`;
    }

    // ── FRACCIÓN ──
    if (isFrac) {
      const denFijo = !!act.denominadorFijo;
      const denFijoVal = act.denomFijoVal != null ? act.denomFijoVal : '';
      // Pre-fill avanceDen with fixed value when denominadorFijo and not yet entered
      const denVal = (denFijo && !avanceDen) ? String(denFijoVal) : avanceDen;
      const x = parseFloat(avanceNum), y = parseFloat(denVal);
      const hasResult = !isNaN(x) && !isNaN(y) && y > 0;
      const resultPct = hasResult ? (x / y * 100).toFixed(2) + '%' : null;
      const mpNum = mp ? parseFloat(mp.label) : null;
      const progPct = (hasResult && mpNum && mpNum > 0) ? Math.min(x/y*100/mpNum*100, 100) : 0;

      const denField = denFijo
        ? `<div>
            <span class="avance-frac-label">Denominador (Y)<span class="den-fijo-badge"><svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m11.25 11.25.041-.02a.75.75 0 0 1 1.063.852l-.708 2.836a.75.75 0 0 0 1.063.853l.041-.021M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9-3.75h.008v.008H12V8.25Z"/></svg>Fijo<span class="den-tooltip">Configurado en la planeación, si se requiere cambiar a meta variable, contactar al administrador</span></span></span>
            <input type="number" class="avance-input-field" value="${denFijoVal}" readonly
                   style="background:#F3F4F6;color:#6B7280;cursor:not-allowed;width:100%">
            <p class="avance-frac-desc">${act.denominador}</p>
           </div>`
        : `<div>
            <span class="avance-frac-label">Denominador (Y)</span>
            <input type="number" class="avance-input-field" value="${denVal}"
                   oninput="onAvanceDen(this.value)" placeholder="0.01" min="0.01" style="width:100%">
            <p class="avance-frac-desc">${act.denominador}</p>
           </div>`;

      return `
        <div class="avance-ctx">${ctx}</div>
        ${histHtml}
        ${avanceSaved ? `
          <div class="avance-saved-banner">
            ${CHECK_ICO}
            Avance guardado: <strong style="margin-left:2px">${avanceValue}</strong>
            <span style="font-size:11px;color:#15803D;margin-left:4px">(X=${avanceNum}, Y=${denVal})</span>
            . Puedes actualizarlo.
          </div>` : ''}
        <div class="avance-frac-grid">
          <div>
            <span class="avance-frac-label">Numerador (X)</span>
            <input type="number" class="avance-input-field" value="${avanceNum}"
                   oninput="onAvanceNum(this.value)" placeholder="0" min="0" style="width:100%">
            <p class="avance-frac-desc">${act.numerador}</p>
          </div>
          ${denField}
        </div>
        <div class="avance-calc-block">
          <p class="avance-calc-lbl">( X ÷ Y ) × 100</p>
          <p class="avance-calc-val ${resultPct ? '' : 'avance-calc-empty'}" id="avanceCalcVal">${resultPct || 'Ingresa X y Y para calcular'}</p>
          <p class="avance-no-meta-warn" id="avanceCalcWarn"><svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"/></svg><span><strong>La meta del período no fue alcanzada.</strong> Deberás justificar el incumplimiento en el apartado de comentarios.</span></p>
        </div>
        <div id="avanceProgWrap" class="avance-prog" style="display:${hasResult && mpNum ? 'block' : 'none'}">
          <div class="avance-prog-labels">
            <span id="avanceProgLabel">${resultPct ? resultPct + ' del período' : ''}</span>
            <span>Meta: ${mp ? mp.label : '—'}</span>
          </div>
          <div class="avance-prog-track">
            <div class="avance-prog-fill" id="avanceProgFill" style="width:${progPct}%"></div>
          </div>
        </div>
        <button class="btn-save-avance" id="btnSaveAvanceFrac" onclick="saveAvance()" ${hasResult ? '' : 'disabled'}>
          ${SAVE_ICO} Guardar avance
        </button>
        ${sinAvanceSect}`;
    }

    // ── SIMPLE ──
    return `
      <div class="avance-ctx">${ctx}</div>
      ${histHtml}
      ${avanceSaved ? `
        <div class="avance-saved-banner">
          ${CHECK_ICO}
          Avance guardado: <strong style="margin-left:2px">${avanceValue}${unitSuffix}</strong>. Puedes actualizarlo si es necesario.
        </div>` : ''}
      <label class="avance-input-label">Valor de avance — ${act.periodo}</label>
      <div class="avance-input-row">
        <input type="text" class="avance-input-field" value="${avanceValue}"
               oninput="onAvanceInput(this.value)"
               placeholder="Ej: ${act.acumulable ? '150' : '78.5'}">
        ${unitSuffix ? `<span class="avance-unit">${unitSuffix}</span>` : ''}
      </div>
      <p class="avance-hint">Registra el valor obtenido para este período según el método de cálculo del indicador.</p>
      <button class="btn-save-avance" onclick="saveAvance()" ${avanceValue.trim() ? '' : 'disabled'}>
        ${SAVE_ICO} Guardar avance
      </button>
      ${sinAvanceSect}`;
  }

  // ── Reporte accordion (3 pasos) ───────────────────────────────────────────
  function renderReporteAccordion(act) {
    const editable       = isEditable();
    const step1Done      = avanceSaved;
    const step2Done      = act.archivosEvidencia.length > 0;
    const step3Done      = analisisSaved;
    const step2Accessible = !editable || step1Done;
    const step3Accessible = !editable || (step1Done && (step2Done || justSaved));

    // Determinar si la meta del período se cumplió con base al avance registrado
    let metaCumplida = null;
    if (avanceSaved && act.tieneDenominador) {
      const _den = act.denominadorFijo ? String(act.denomFijoVal) : avanceDen;
      const _x = parseFloat(avanceNum), _y = parseFloat(_den);
      const _mp = calcMetaPeriodo(act.metaAnual, act.frecuenciaMedicion, act.acumulable);
      const _mpNum = _mp ? parseFloat(_mp.label) : null;
      if (!isNaN(_x) && !isNaN(_y) && _y > 0 && _mpNum) {
        metaCumplida = (_x / _y * 100) >= _mpNum;
      }
    }

    const isSent  = act.estado === 'enviado_revision';
    const EDIT_S  = `<svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L6.832 19.82a4.5 4.5 0 0 1-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 0 1 1.13-1.897L16.863 4.487Zm0 0L19.5 7.125"/></svg>`;
    const editBtn = (n, active) => (isSent && !isRevisor)
      ? `<button class="step-edit-btn${active?' editing':''}" onclick="toggleEditStep(${n})">${EDIT_S} ${active ? 'Cancelar' : 'Editar'}</button>`
      : '';
    const revisorBanner = isRevisor
      ? `<div class="revisor-banner"><svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/></svg>Vista del Revisor — Carlos Mendoza</div>`
      : '';
    const CHECK_S = `<svg fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" width="13" height="13"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>`;
    const LOCK_S  = `<svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"/></svg>`;
    const SAVE_S  = `<svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="14" height="14"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>`;
    const DOC_S   = `<svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"/></svg>`;
    const CHECK_ICO = `<svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>`;

    const badge = (num, done, accessible) => done
      ? `<div class="step-badge done">${CHECK_S}</div>`
      : accessible
        ? `<div class="step-badge active">${num}</div>`
        : `<div class="step-badge locked">${num}</div>`;

    const doneChip = (label) =>
      `<span class="step-done-chip">${CHECK_S} ${label}</span>`;

    const lockBody = (msg) =>
      `<div class="step-sep"></div><div class="step-locked-body">${LOCK_S} ${msg}</div>`;

    // ── Paso 1: Meta del indicador ────────────────────────────────────────
    _editOverride = editable || editingStep1;
    const avanceContent = renderAvanceSection(act);
    _editOverride = null;

    const paso1 = `
      <div class="step-card">
        <div class="step-hdr">
          ${badge(1, step1Done, true)}
          <div class="step-title-col">
            <p class="step-card-name">Meta del indicador</p>
          </div>
          ${step1Done ? doneChip('Completado') : ''}
          ${editBtn(1, editingStep1)}
        </div>
        <div class="step-sep"></div>
        <div class="step-body">${avanceContent}</div>
      </div>`;

    // ── Paso 2: Medio de verificación + carga de evidencia ────────────────
    _editOverride = editable || editingStep2;
    const evidenceContent = renderEvidenceSection(act);
    _editOverride = null;

    const paso2Body = `
      <div class="mv-box" style="margin-bottom:12px">
        <div class="mv-box-title">${DOC_S}Documento requerido</div>
        <p>${act.medioVerificacion}</p>
      </div>
      <div class="mv-rule" style="margin-bottom:16px">
        <p class="mv-rule-title"><svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" style="width:12px;height:12px;vertical-align:middle;margin-right:4px;margin-top:-2px"><path stroke-linecap="round" stroke-linejoin="round" d="m11.25 11.25.041-.02a.75.75 0 0 1 1.063.852l-.708 2.836a.75.75 0 0 0 1.063.853l.041-.021M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9-3.75h.008v.008H12V8.25Z"/></svg>Reglas de carga</p>
        <p>${act.reglasExtra}</p>
      </div>
      ${evidenceContent}
      ${editingStep2 ? `<button class="btn-save-avance" onclick="guardarEvidencia()" style="margin-top:14px">${SAVE_S} Guardar</button>` : ''}`;

    const paso2 = `
      <div class="step-card" id="secEvidencia">
        <div class="step-hdr">
          ${badge(2, step2Done, step2Accessible)}
          <div class="step-title-col">
            <p class="step-card-name ${step2Accessible ? '' : 'locked'}">Medio de verificación</p>
          </div>
          ${step2Done ? doneChip(`${act.archivosEvidencia.length} archivo${act.archivosEvidencia.length !== 1 ? 's' : ''}`) : ''}
          ${!step2Accessible ? `<span class="step-lock-icon">${LOCK_S}</span>` : ''}
          ${editBtn(2, editingStep2)}
        </div>
        ${step2Accessible
          ? `<div class="step-sep"></div><div class="step-body">${paso2Body}</div>`
          : lockBody('Registra el valor del avance primero.')}
      </div>`;

    // ── Paso 3: Análisis del reporte ──────────────────────────────────────
    const logrocausasBlock = metaCumplida === true
      ? `<span class="analisis-q" style="margin-top:0">Acciones que llevaron al logro de la meta</span>
         <textarea class="txt-area" rows="3" oninput="onAnalisisLogro(this.value)" placeholder="Describe qué acciones contribuyeron al cumplimiento de la meta...">${analisisLogro}</textarea>`
      : metaCumplida === false
      ? `<span class="analisis-q" style="margin-top:0">Causas por las que no se logró la meta</span>
         <textarea class="txt-area" rows="3" oninput="onAnalisisCausas(this.value)" placeholder="Describe los factores que impidieron alcanzar la meta...">${analisisCausas}</textarea>`
      : '';

    const step3Editable = editable || editingStep3;
    const analisisEditForm = `
         ${analisisSaved ? `<div class="avance-saved-banner" style="margin-bottom:12px">${CHECK_ICO} Análisis guardado. Puedes actualizarlo.</div>` : ''}
         ${logrocausasBlock}
         <span class="analisis-q" ${metaCumplida !== null ? '' : 'style="margin-top:0"'}>Riesgos</span>
         <span class="analisis-caption">Explica las situaciones o cambios que pongan en peligro lograr la meta del indicador:</span>
         <textarea class="txt-area" rows="3" oninput="onAnalisisRiesgos(this.value)" placeholder="Describe posibles amenazas o factores que dificulten el cumplimiento futuro...">${analisisRiesgos}</textarea>
         <span class="analisis-q">Oportunidades</span>
         <span class="analisis-caption">Explica las situaciones o cambios que puedan aprovecharse para lograr la meta del indicador:</span>
         <textarea class="txt-area" rows="3" oninput="onAnalisisOportunidades(this.value)" placeholder="Describe factores favorables o áreas de mejora que puedan potenciarse...">${analisisOportunidades}</textarea>
         <span class="analisis-q">Toma de decisiones</span>
         <span class="analisis-caption">Explica las acciones implementadas y/o propuestas para mejorar el resultado del indicador:</span>
         <textarea class="txt-area" rows="3" oninput="onAnalisisAcciones(this.value)" placeholder="Describe las decisiones tomadas o acciones concretas en marcha o propuestas...">${analisisAcciones}</textarea>
         <button class="btn-save-avance" onclick="guardarAnalisis()" style="margin-top:14px">
           ${SAVE_S} Guardar análisis
         </button>`;

    const logrocausasLabel = metaCumplida === true ? 'Acciones que llevaron al logro de la meta'
      : metaCumplida === false ? 'Causas por las que no se logró la meta' : null;
    const logrocausasVal = metaCumplida === true ? analisisLogro : analisisCausas;

    const analisisReadOnly = analisisSaved
      ? `${logrocausasLabel ? `<div class="ro-analisis-field"><span class="ro-analisis-label">${logrocausasLabel}</span><p class="ro-analisis-value">${logrocausasVal || '—'}</p></div>` : ''}
         <div class="ro-analisis-field"><span class="ro-analisis-label">Riesgos</span><p class="ro-analisis-value">${analisisRiesgos || '—'}</p></div>
         <div class="ro-analisis-field"><span class="ro-analisis-label">Oportunidades</span><p class="ro-analisis-value">${analisisOportunidades || '—'}</p></div>
         <div class="ro-analisis-field"><span class="ro-analisis-label">Toma de decisiones</span><p class="ro-analisis-value">${analisisAcciones || '—'}</p></div>`
      : `<p style="font-size:13px;color:var(--color-text-secondary)">Sin análisis registrado para este período.</p>`;

    const analisisContent = step3Editable ? analisisEditForm : analisisReadOnly;

    const paso3 = `
      <div class="step-card" id="secComentarios">
        <div class="step-hdr">
          ${badge(3, step3Done, step3Accessible)}
          <div class="step-title-col">
            <p class="step-card-name ${step3Accessible ? '' : 'locked'}">Análisis del reporte</p>
          </div>
          ${step3Done ? doneChip('Análisis completado') : ''}
          ${!step3Accessible ? `<span class="step-lock-icon">${LOCK_S}</span>` : ''}
          ${editBtn(3, editingStep3)}
        </div>
        ${step3Accessible
          ? `<div class="step-sep"></div><div class="step-body">${analisisContent}</div>`
          : lockBody('Carga evidencia o justifica la ausencia primero.')}
      </div>`;

    return revisorBanner + paso1 + paso2 + paso3;
  }

  // ── Toggle sections ───────────────────────────────────────────────────────
  function toggleSection(id) {
    const hdr  = document.querySelector(`[data-sec="${id}"]`);
    const body = document.getElementById('sec-' + id);
    if (!hdr || !body) return;
    const open = body.classList.toggle('open');
    hdr.classList.toggle('open', open);
  }

  // ── Render evidence section ───────────────────────────────────────────────
  function renderEvidenceSection(act) {
    const editable = isEditable();
    const isObs    = act.estado === 'observado';

    const feLabel = { borrador:'Borrador', pendiente_envio:'Listo p/ enviar', enviado:'Enviado', aprobado:'Aprobado', observado:'Observado', invalido:'Inválido' };
    const feCls   = { borrador:'fe-borrador', pendiente_envio:'fe-pendiente', enviado:'fe-enviado', aprobado:'fe-aprobado', observado:'fe-observado', invalido:'fe-invalido' };

    const fileRows = act.archivosEvidencia.map(f => {
      const icCls = fileIconCls(f.tipo);
      const icLbl = fileIconLbl(f.tipo);
      const isImg = f.preview && typeof f.preview === 'string' && f.preview.startsWith('data:image');
      const isDel = editable && (f.estado === 'borrador' || f.estado === 'pendiente_envio');
      const isRep = editable && f.estado !== 'enviado' && f.estado !== 'aprobado';
      const fSt   = feCls[f.estado] || 'fe-borrador';
      const fLbl  = feLabel[f.estado] || f.estado;
      return `
        <div class="file-item">
          <div class="file-item-row">
            ${isImg
              ? `<div class="file-thumb has-preview"><img src="${f.preview}" alt="${f.nombre}"></div>`
              : `<div class="file-icon ${icCls}">${icLbl}</div>`}
            <div class="file-info">
              <p class="file-name" title="${f.nombre}">${f.nombre}</p>
              <p class="file-meta">${f.tipo} · ${f.tamanio} · ${f.fechaCarga}</p>
            </div>
            <div class="file-actions">
              <span class="file-estado ${fSt}">${fLbl}</span>
              ${isRep ? `<button class="file-btn" onclick="replaceFile('${f.id}')" title="Reemplazar archivo"><svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99"/></svg></button>` : ''}
              ${isDel ? `<button class="file-btn del" onclick="deleteFile('${f.id}')" title="Eliminar"><svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"/></svg></button>` : ''}
            </div>
          </div>
          ${isDel ? `
            <div class="file-notes-wrap">
              <label class="file-notes-label">Nota opcional sobre este archivo</label>
              <textarea class="file-notes-ta" id="notes-${f.id}" placeholder="Ej: Reporte generado el 08-jun. Incluye desglose por zona." oninput="updateFileNotes('${f.id}',this.value)">${f.notes||''}</textarea>
            </div>` : (f.notes ? `<div class="file-notes-wrap"><p class="file-notes-ro">"${f.notes}"</p></div>` : '')}
        </div>`;
    }).join('');

    const uploadZoneHtml = uploadLoading
      ? `<div class="upload-loading"><div class="spinner"></div><p class="upload-loading-text">Cargando archivo…</p></div>`
      : `<div class="upload-zone" id="uploadZone" onclick="triggerUpload()"
             ondragover="event.preventDefault();this.classList.add('drag')"
             ondragleave="this.classList.remove('drag')"
             ondrop="handleDrop(event)">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5"/></svg>
          <p>Arrastra tu archivo aquí o <strong>selecciónalo</strong></p>
          <span>PDF, Excel, Word, JPG, PNG · Máx. ${MAX_MB} MB por archivo</span>
        </div>
        <div class="allowed-formats">
          <span>Formatos permitidos:</span>
          ${['PDF','XLSX','DOCX','JPG','PNG'].map(f => `<span class="format-tag">${f}</span>`).join('')}
        </div>`;

    const justSupportHtml = justSupportFile
      ? `<div class="justify-support-file"><svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg><span>Adjunto: <strong>${justSupportFile.name}</strong></span></div>`
      : `<button class="justify-file-btn" onclick="document.getElementById('justSupportInput').click()"><svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m18.375 12.739-7.693 7.693a4.5 4.5 0 0 1-6.364-6.364l10.94-10.94A3 3 0 1 1 19.5 7.372L8.552 18.32m.009-.01-.01.01m5.699-9.941-7.81 7.81a1.5 1.5 0 0 0 2.112 2.13"/></svg>Adjuntar soporte (opcional)</button>`;

    const justCharsOk = justText.trim().length > 0;

    return `
      ${uploadError ? `
        <div class="upload-error-banner">
          <div class="ue-icon"><svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"/></svg></div>
          <div class="ue-body">
            <p class="ue-title">No se pudo cargar "${uploadError.name}"</p>
            <p class="ue-msg">${uploadError.msg}</p>
          </div>
          <button class="ue-dismiss" onclick="dismissError()" title="Cerrar">×</button>
        </div>` : ''}

      ${act.archivosEvidencia.length > 0 ? `<div class="file-list">${fileRows}</div>` : ''}

      ${isObs ? `
        <div style="background:#FFF7ED;border:1px solid #FED7AA;border-radius:10px;padding:11px 14px;margin-bottom:12px;display:flex;gap:8px;font-size:12px;color:#9A3412;line-height:1.5;">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="14" height="14" style="flex-shrink:0;margin-top:2px;"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"/></svg>
          Esta actividad tiene una observación del Revisor. Elimina el archivo anterior y carga la corrección solicitada.
        </div>` : ''}

      ${editable ? `<div class="upload-area">${uploadZoneHtml}</div>` : ''}

      ${!editable && act.archivosEvidencia.length === 0 ? '<p style="font-size:13px;color:var(--color-text-secondary);">Sin archivos de evidencia cargados.</p>' : ''}

      ${editable ? `
        <div class="justify-card${justOpen?' open':''}">
          ${justOpen ? `<button class="justify-cancel-btn" onclick="toggleJustify()">Cancelar</button>` : ''}
          <div class="justify-toggle-row${justOpen?' open':''}" onclick="toggleJustify()">
            <div class="justify-icon">
              <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 5.25h.008v.008H12v-.008Z"/></svg>
            </div>
            <div class="justify-texts">
              <p class="justify-title">No cuento con evidencia disponible</p>
              <p class="justify-sub">Justificar la ausencia del medio de verificación</p>
            </div>
          </div>
          <div class="justify-inner${justOpen?' open':''}">
            <div class="justify-warning">
              <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"/></svg>
              Esta opción debe usarse únicamente cuando el documento requerido no está disponible en el período. El Revisor evaluará si la justificación es válida antes de aprobar o rechazar la actividad.
            </div>
            <textarea id="justTA" class="justify-ta" placeholder="Describe detalladamente el motivo por el que no cuentas con el medio de verificación para este período. Incluye fechas, causas y cualquier evidencia alternativa disponible…" oninput="onJustifyInput(this.value)">${justText}</textarea>
            <label class="justify-support-label">Documento de soporte (opcional)</label>
            ${justSupportHtml}
            <button class="btn-send-justify" id="btnSendJustify" onclick="sendJustification()" ${justCharsOk?'':'disabled'}>
              <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M17.25 8.25 21 12m0 0-3.75 3.75M21 12H3"/></svg>
              Guardar y continuar
            </button>
          </div>
        </div>` : ''}
    `;
  }

  // ── Render main ───────────────────────────────────────────────────────────
  function renderMain(act) {
    const cfg   = ESTADO_CFG[act.estado] || { label: act.estado, cls: '' };
    const nivel = NIVEL_CFG[act.nivelCodigo] || { label: act.nivelCodigo, cls: '' };
    const editable = isEditable();
    const isObs    = act.estado === 'observado';

    const obsHtml = act.observaciones.length === 0
      ? '<p style="font-size:13px;color:var(--color-text-secondary);">Sin observaciones registradas.</p>'

          <div class="obs-card">
            <div class="obs-card-header">
              <div class="obs-card-icon"><svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"/></svg></div>

            <div class="obs-status ${o.atendida?'atendida':'pendiente'}">
              <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                ${o.atendida
                  ? '<path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>'
                  : '<path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"/>'}
              </svg>
              ${o.atendida ? 'Observación atendida' : 'Pendiente de corrección'}
            </div>
          </div>`).join('');

    const histHtml = [...act.historial].reverse().map(h => `
      <div class="tl-item">
        <div class="tl-dot ${rolDotCls(h.rol)}"></div>
        <p class="tl-time">${h.fecha} · ${h.hora}</p>
        <p class="tl-accion">${h.accion}</p>
        ${(h.estadoAnterior || h.estadoNuevo) ? `
          <p class="tl-estado">
            ${h.estadoAnterior ? `<span>${ESTADO_CFG[h.estadoAnterior]?.label||h.estadoAnterior}</span><span class="tl-arrow">→</span>` : ''}
            ${h.estadoNuevo ? `<span>${ESTADO_CFG[h.estadoNuevo]?.label||h.estadoNuevo}</span>` : ''}
          </p>` : ''}
        <p class="tl-actor">${h.usuario} · ${h.rol}</p>
      </div>`).join('');

    document.getElementById('mainContent').innerHTML = `
      <div class="breadcrumb">
        <a href="mis-actividades.html">Mis actividades</a>
        <svg fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5"/></svg>
        <span>${act.id}</span>
      </div>

      <div class="detail-cols">

        <!-- COLUMNA IZQUIERDA: HEADER + MIR INFO -->
        <div class="detail-col">
          <div class="header-card">
            <div class="hc-top">
              <div><p class="hc-id">${act.id}</p><h1 class="hc-title">${act.nombre}</h1></div>
              <span class="estado-badge ${cfg.cls}" style="flex-shrink:0;margin-top:4px;">${cfg.label}</span>
            </div>
            <div class="hc-meta">
              <div class="hc-meta-item"><svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18M9 6.75h1.5m-1.5 3h1.5m-1.5 3h1.5m3-6H15m-1.5 3H15m-1.5 3H15M9 21v-3.375c0-.621.504-1.125 1.125-1.125h3.75c.621 0 1.125.504 1.125 1.125V21"/></svg><strong>${act.gerencia}</strong></div>
              <div class="hc-meta-item"><svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5"/></svg>Período: <strong>${act.periodo}</strong></div>
              <div class="hc-meta-item"><svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>Frecuencia: <strong>${act.frecuenciaMedicion}</strong></div>
              <div class="hc-meta-item"><span class="nivel-badge ${nivel.cls}">${nivel.label}</span></div>
            </div>
          </div>
          <div class="section-card">
            <div class="section-header open" data-sec="mir" onclick="toggleSection('mir')">
              <div class="section-title"><svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 0 1 3 19.875v-6.75ZM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V8.625ZM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V4.125Z"/></svg>Información MIR</div>
              <svg class="section-chevron" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5"/></svg>
            </div>
            <div class="section-body open" id="sec-mir">
              <div class="info-grid single">
                <div class="info-item"><label>Objetivo</label><p>${act.objetivo}</p></div>
                <div class="info-divider"></div>
                <div class="info-item"><label>Denominación del indicador</label><p>${act.denominacionIndicador}</p></div>
                <div class="info-divider"></div>
                <div class="info-item"><label>Nivel MIR</label><p><span class="nivel-badge ${nivel.cls}">${nivel.label}</span></p></div>
                <div class="info-item"><label>Frecuencia de medición</label><p>${act.frecuenciaMedicion}</p></div>
                <div class="info-item"><label>Línea base</label><p>${act.lineaBase}</p></div>
                <div class="info-item"><label>Meta anual</label><p>${act.metaAnual}</p></div>
                <div class="info-divider"></div>
                <div class="info-item"><label>Método de cálculo</label><p class="mono">${act.metodoCalculo}</p></div>
                <div class="info-divider"></div>
                <div class="info-item"><label>Numerador</label><p>${act.numerador}</p></div>
                <div class="info-item"><label>Denominador</label><p>${act.denominador}</p></div>

          </div>
        </div>

        <!-- COLUMNA DERECHA: REPORTE + EVIDENCIA + OBS + HISTORIAL -->
        <div class="detail-col">

          <!-- REPORTE DE AVANCE — ACORDEÓN 3 PASOS -->
          ${renderReporteAccordion(act)}

          <!-- OBSERVACIONES -->
          <div class="section-card">
            <div class="section-header${isObs?' open':''}" data-sec="obs" onclick="toggleSection('obs')">
              <div class="section-title">
                <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"/></svg>
                Observaciones
                ${act.observaciones.length > 0 ? `<span style="display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:9px;padding:0 5px;background:#F97316;color:white;font-size:10px;font-weight:700;">${act.observaciones.length}</span>` : ''}
              </div>
              <svg class="section-chevron" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5"/></svg>
            </div>
            <div class="section-body${isObs?' open':''}" id="sec-obs">${obsHtml}</div>
          </div>

          <!-- HISTORIAL -->
          <div class="section-card">
            <div class="section-header" data-sec="hist" onclick="toggleSection('hist')">

              <svg class="section-chevron" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5"/></svg>

            <div class="section-body" id="sec-hist"><div class="timeline">${histHtml}</div></div>

        </div><!-- /detail-col right -->
      </div><!-- /detail-cols -->
    `;
  }

  // ── Panel del Revisor ─────────────────────────────────────────────────────
  function renderRevisorPanel(act) {
    const cfg   = ESTADO_CFG[act.estado] || { label: act.estado, cls: '' };
    const dias  = diasRestantes(act.fechaLimite);
    const dCls  = dias < 0 ? '' : dias <= 7 ? 'urgente' : dias <= 14 ? 'proximo' : 'normal';
    const dTxt  = dias < 0 ? 'Vencida' : dias === 0 ? 'Hoy' : `${dias} días`;
    const aprobado = act.estado === 'aprobado_revisor';
    const observado = act.estado === 'observado';
    const CHECK_S = `<svg fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" width="13" height="13"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>`;

    const steps = [
      { label: 'Reporte recibido',    done: true,     current: false },
      { label: 'En revisión técnica', done: aprobado || observado, current: !aprobado && !observado },
      { label: 'Dictamen emitido',    done: aprobado || observado, current: false },
    ];

    document.getElementById('actionPanel').innerHTML = `
      <a class="ap-back" href="historial-revisor.html"><svg fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/></svg>Mis indicadores</a>
      <div class="ap-divider"></div>

      <p class="ap-title">Estado del reporte</p>
      <div class="ap-estado-wrap"><p class="ap-estado-lbl">Estado</p><span class="estado-badge ${cfg.cls}">${cfg.label}</span></div>

      <p class="ap-title" style="margin-top:14px">Fechas</p>
      <div class="ap-fecha-wrap">
        <div class="ap-fecha-item"><p class="ap-fecha-lbl">Fecha límite</p><p class="ap-fecha-val ${dCls}">${formatFecha(act.fechaLimite)}</p></div>
        <div class="ap-fecha-item"><p class="ap-fecha-lbl">Tiempo</p><p class="ap-fecha-val ${dCls}">${dTxt}</p></div>
      </div>

      ${!aprobado && !observado ? `
        <div class="ap-divider"></div>
        <p class="ap-title">Acciones del revisor</p>
        <button class="btn-full primary" onclick="aprobarIndicador()" style="background:#059669;margin-bottom:8px">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>
          Aprobar reporte
        </button>
        <button class="btn-full secondary" onclick="toggleObs()" style="${obsOpen ? 'border-color:#EA580C;color:#EA580C' : ''}">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"/></svg>
          ${obsOpen ? 'Cancelar observación' : 'Enviar observación'}
        </button>
        ${obsOpen ? `
          <div class="revisor-obs-wrap">
            <span class="revisor-obs-label">Observación al enlace</span>
            <textarea class="obs-ta" placeholder="Describe qué debe corregir o complementar el enlace en su reporte…" oninput="onObsInput(this.value)">${obsRevisorText}</textarea>
            <button class="btn-full warning" onclick="enviarObservacion()" style="margin-top:8px" ${obsRevisorText.trim() ? '' : 'disabled'}>
              <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5"/></svg>
              Enviar observación
            </button>
          </div>` : ''}
      ` : ''}

      ${aprobado ? `<div class="info-box info-green"><svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" width="28" height="28" style="color:#22C55E;"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg><p class="ib-title">Reporte aprobado</p><p class="ib-sub">Has aprobado técnicamente este reporte.</p></div>` : ''}
      ${observado ? `<div class="info-box" style="background:#FFF7ED;border-color:#FED7AA"><svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" width="28" height="28" style="color:#EA580C;"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"/></svg><p class="ib-title">Observación enviada</p><p class="ib-sub">Esperando corrección del Enlace.</p></div>` : ''}

      <div class="ap-divider"></div>
      <p class="ap-title">Flujo de revisión</p>
      ${steps.map(s => `
        <div class="ap-step ${s.done?'done':s.current?'current':''}">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
            ${s.done ? '<path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>'
              : s.current ? '<path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"/>'
              : '<circle cx="12" cy="12" r="9" stroke-width="1.5"/>'}
          </svg>
          ${s.label}
        </div>`).join('')}

      <div class="ap-divider"></div>
      <p class="ap-title">Responsables</p>
      <div style="display:flex;flex-direction:column;gap:6px;">
        <div class="ap-assignee"><div class="ap-av enlace">AT</div><div><p class="ap-av-name">${act.responsableEnlace}</p><p class="ap-av-rol">Enlace</p></div></div>
        <div class="ap-assignee"><div class="ap-av revisor">CM</div><div><p class="ap-av-name">${act.responsableRevisor}</p><p class="ap-av-rol">Revisor</p></div></div>
      </div>
    `;
  }

  // ── Render action panel ───────────────────────────────────────────────────
  function renderActionPanel(act) {
    if (isRevisor) { renderRevisorPanel(act); return; }
    const cfg  = ESTADO_CFG[act.estado] || { label: act.estado, cls: '' };
    const dias = diasRestantes(act.fechaLimite);
    const dCls = dias < 0 ? '' : dias <= 7 ? 'urgente' : dias <= 14 ? 'proximo' : 'normal';
    const dTxt = dias < 0 ? 'Vencida' : dias === 0 ? 'Hoy' : `${dias} días`;
    const editable  = isEditable();
    const isObs     = act.estado === 'observado';
    const inReview  = ['enviado_revision','pendiente_revision'].includes(act.estado);
    const approved  = ['aprobado_revisor','validado_admin','publicado'].includes(act.estado);
    const steps = [
      { label:'Carga de evidencia',  done:!['borrador','pendiente_carga'].includes(act.estado), current:act.estado==='pendiente_carga' },
      { label:'Enviada a revisión',  done:!['borrador','pendiente_carga','pendiente_envio'].includes(act.estado), current:act.estado==='pendiente_envio' },
      { label:'En revisión',         done:['aprobado_revisor','validado_admin','publicado','observado','corregido'].includes(act.estado), current:inReview },
      { label:'Aprobada',            done:approved, current:false },
    ];

    document.getElementById('actionPanel').innerHTML = `
      <a class="ap-back" href="mis-actividades.html"><svg fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/></svg>Mis actividades</a>
      <div class="ap-divider"></div>

      <p class="ap-title">Estado actual</p>
      <div class="ap-estado-wrap"><p class="ap-estado-lbl">Estado</p><span class="estado-badge ${cfg.cls}">${cfg.label}</span></div>

      <p class="ap-title">Fechas</p>
      <div class="ap-fecha-wrap">
        <div class="ap-fecha-item"><p class="ap-fecha-lbl">Fecha límite</p><p class="ap-fecha-val ${dCls}">${formatFecha(act.fechaLimite)}</p></div>
        <div class="ap-fecha-item"><p class="ap-fecha-lbl">Tiempo</p><p class="ap-fecha-val ${dCls}">${dTxt}</p></div>
      </div>

      ${editable ? `
        <p class="ap-title">Acciones</p>
        ${isObs ? `
          <button class="btn-full warning" onclick="document.getElementById('secEvidencia').scrollIntoView({behavior:'smooth'})">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5"/></svg>
            Cargar corrección
          </button>` : `
          <button class="btn-full secondary" onclick="document.getElementById('secEvidencia').scrollIntoView({behavior:'smooth'})">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5"/></svg>
            Cargar evidencia
          </button>`}
        <button class="btn-full secondary" onclick="saveAsDraft()">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0 1 11.186 0Z"/></svg>
          Guardar borrador
        </button>
        <button id="btnEnviar" class="btn-full primary" onclick="openModal()" disabled>
          <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5"/></svg>
          ${isObs ? 'Enviar corrección' : 'Enviar a revisión'}
        </button>
        <p class="send-hint" id="sendHint">Carga evidencia o agrega una justificación (mín. ${MIN_JUSTIFY} chars).</p>
      ` : ''}

      ${inReview ? `<div class="info-box info-blue"><svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" width="28" height="28" style="color:#3B82F6;"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg><p class="ib-title">En revisión</p><p class="ib-sub">El Revisor está evaluando tu evidencia.</p></div>` : ''}
      ${approved  ? `<div class="info-box info-green"><svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" width="28" height="28" style="color:#22C55E;"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg><p class="ib-title">Aprobada</p><p class="ib-sub">El Revisor aprobó técnicamente esta actividad.</p></div>` : ''}

      <div class="ap-divider"></div>
      <p class="ap-title">Flujo de trabajo</p>
      ${steps.map(s => `
        <div class="ap-step ${s.done?'done':s.current?'current':''}">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
            ${s.done
              ? '<path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>'
              : s.current
              ? '<path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"/>'
              : '<circle cx="12" cy="12" r="9" stroke-width="1.5"/>'}
          </svg>
          ${s.label}
        </div>`).join('')}

      <div class="ap-divider"></div>
      <p class="ap-title">Responsables</p>
      <div style="display:flex;flex-direction:column;gap:6px;">
        <div class="ap-assignee"><div class="ap-av enlace">AT</div><div><p class="ap-av-name">${act.responsableEnlace}</p><p class="ap-av-rol">Enlace</p></div></div>
        <div class="ap-assignee"><div class="ap-av revisor">CM</div><div><p class="ap-av-name">${act.responsableRevisor}</p><p class="ap-av-rol">Revisor</p></div></div>
      </div>
    `;

    // Update send button state after render
    setTimeout(updateSendBtn, 0);
  }

  function renderPage() {
    if (!actividad) return;
    renderMain(actividad);
    renderActionPanel(actividad);
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    const id = getParam('id') || 'COM-ACT-08';
    actividad = getActividad(id);
    if (isRevisor && actividad) {
      actividad.estado = 'enviado_revision';
      avanceSaved = true;
      avanceNum = '4982000';
      avanceDen = String(actividad.denomFijoVal || 5400000);
      avanceValue = '92.26%';
      if (!actividad.archivosEvidencia.length) {
        actividad.archivosEvidencia = [{ id:'demo-rev-1', nombre:'Reporte_facturacion_Q2_2026.pdf', tipo:'PDF', peso:'1.2 MB', fecha:'2026-06-09', estado:'cargado' }];
      }
      justSaved = true;
      analisisSaved = true;
      analisisCausas = 'La meta no se alcanzó debido a ajustes en el padrón de usuarios activos durante abril y mayo. Se registraron 428 bajas por cambio de domicilio y 112 por proceso de depuración catastral.';
      analisisRiesgos = 'El proceso de actualización catastral puede continuar generando baja temporal en el padrón durante julio. La temporada de lluvias puede afectar la operación en colonias con infraestructura deteriorada.';
      analisisOportunidades = 'La digitalización del módulo de atención en ventanilla avanza al 78% y permitirá reducir tiempos de tramitación en el Q3. El convenio con el municipio para actualización de medidores en 3 colonias prioritarias se firmará en julio.';
      analisisAcciones = 'Se implementó un protocolo de seguimiento semanal con brigadas de campo para validar altas y bajas. Se propone incrementar la meta mensual de reactivaciones de 80 a 95 a partir de julio con refuerzo de 2 personas al equipo.';
    }
    if (!actividad) {
      document.getElementById('mainContent').innerHTML = `<div class="not-found"><svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"/></svg><h2 style="font-size:18px;font-weight:700;margin-bottom:6px;">Actividad no encontrada</h2><p style="font-size:13px;color:var(--color-text-secondary);">El indicador "${id}" no está asignado.<br><br><a href="mis-actividades.html" style="color:var(--color-primary);font-weight:700;">← Volver al listado</a></p></div>`;
      document.getElementById('actionPanel').innerHTML = '';
      return;
    }
    renderPage();
  });

  document.getElementById('confirmModal').addEventListener('click', e => { if (e.target === document.getElementById('confirmModal')) closeModal(); });
</script>
</body>
</html>
